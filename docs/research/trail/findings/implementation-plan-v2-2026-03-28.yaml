title: "Implementation Plan v2: 31 Repo Gaps + Integration Fixes"
date: 2026-03-28
type: implementation-plan

# ============================================================
# PHASE 1: Foundation — chezmoi/mise/hk integration (1 session)
# ============================================================
phase_1:
  title: "Fix integration surface between chezmoi, mise, and hk"
  items:
    - id: INT-01
      title: "Create .chezmoi.toml.tmpl with scriptEnv, container detection, interactive prompts"
      effort: medium
      source: [Drewtopia, integration-research]
      details: |
        - Add promptBoolOnce for dev_computer, ephemeral, personal
        - Add container detection (REMOTE_CONTAINERS, CODESPACES, DEVCONTAINER)
        - Add scriptEnv with MISE_BIN and PATH
        - Add chezmoi git autoCommit + commitMessageTemplate
        - Add diff.pager = "delta" (if delta installed)

    - id: INT-02
      title: "Replace glob with types in hk.pkl + add profiles + batch mode"
      effort: small
      source: [integration-research]
      details: |
        - types = List("python") instead of glob patterns
        - profiles = List("ci") on slow steps (test, zizmor)
        - batch = true on ruff, taplo, shellcheck, shfmt
        - check_first = true on fix-heavy steps

    - id: INT-03
      title: "Add mise [tasks] section to config.toml.tmpl"
      effort: small
      source: [jkp, integration-research]
      details: |
        - lint: hk run pre-commit --all
        - test: cd python && uv run pytest tests/ -x -q
        - check: depends = ["lint", "test"]
        - outdated: mise outdated
        - fmt: hk fix

    - id: INT-04
      title: "Add mise settings: trusted_config_paths, lockfile, status"
      effort: small
      source: [integration-research]
      details: |
        - trusted_config_paths = ["~/.local/share/chezmoi"]
        - lockfile = true
        - status.show_tools = true
        - status.missing_tools = "always"

    - id: INT-05
      title: "Run hk install --mise in chezmoi run_after script"
      effort: small
      source: [integration-research]

    - id: INT-06
      title: "Create .chezmoiignore with OS-conditional exclusions"
      effort: small
      source: [jkp, Drewtopia, shunk031]

    - id: INT-07
      title: "Create .chezmoiexternal.toml for external binary/repo downloads"
      effort: medium
      source: [jkp, shunk031]

# ============================================================
# PHASE 2: AI CLI Management — Claude/Codex/Gemini configs (1 session)
