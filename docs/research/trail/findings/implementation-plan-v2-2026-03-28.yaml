  items:
    - id: AI-01
      title: "Create dot_claude/ directory structure in chezmoi"
      effort: large
      source: [shunk031, Drewtopia, jkp]
      details: |
        - dot_claude/settings.json.tmpl (permissions, hooks, plugins, statusLine)
        - dot_claude/hooks/ (pre_tool_use safety, post_tool_use formatting)
        - dot_claude/rules/ (zero-skip-policy, python, shell)
        - dot_claude/commands/ (custom slash commands)
        - dot_claude/skills/ (project-specific skills)

    - id: AI-02
      title: "Claude pre_tool_use safety hooks"
      effort: medium
      source: [jkp, Drewtopia]
      details: |
        - Block --no-verify on git commit
        - Block push to main/master
        - Block .env file access
        - Block git hook manipulation
        - Log all tool calls

    - id: AI-03
      title: "Claude PostToolUse auto-formatting hooks"
      effort: small
      source: [shunk031]
      details: |
        - Auto ruff format/check on .py edit
        - Auto taplo format on .toml edit

    - id: AI-04
      title: "uv enforcement hook (block pip/python direct execution)"
      effort: small
      source: [shunk031]

    - id: AI-05
      title: "Claude permissions template with allow/deny lists"
      effort: small
      source: [Drewtopia, shunk031]

    - id: AI-06
      title: "Codex and Gemini CLI config templates"
      effort: small
      source: [shunk031, HolyClaude]

