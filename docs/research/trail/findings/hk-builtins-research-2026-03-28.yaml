# ============================================================================
# MISE INTEGRATION
# ============================================================================

mise_integration:
  overview: |
    hk integrates with mise-en-place for tool management. Enable with HK_MISE=1.

  init_with_mise: |
    `hk init --mise` generates a mise.toml with hk installed and a pre-commit task.
    Allows `mise run pre-commit` as alternative to `hk run pre-commit`.

  install_with_mise: |
    `hk install --mise` makes hooks execute via `mise x`, which:
    - Sets up the mise environment
    - Adds tools to PATH
    - Works for devs who haven't activated mise in their shell

  tool_management: |
    Use `mise use` to define tool versions in mise.toml:
      mise use hk
      mise use jq
      mise use taplo
      mise use shellcheck
      mise use shfmt
      mise use actionlint
    All tool deps documented in a single committed file.

  task_management: |
    Use mise tasks within hk steps. In hk.pkl, a step's check command
    can be `mise run <task>` to leverage mise's dependency management,
    option parsing, and parallel execution.

  env_vars: |
    Define [env] section in mise.toml for hook-specific environment variables.
    Example: PRETTIER_CONFIG = ".prettierrc.json"
    mise provides environment variable functionality beyond basic definitions.

# ============================================================================
# HK_PKL_BACKEND=pklr
# ============================================================================

pkl_backend:
  how_to_set: |
    Set environment variable: HK_PKL_BACKEND=pklr

    Methods:
    1. In mise.toml [env] section: HK_PKL_BACKEND = "pklr"
    2. Shell export: export HK_PKL_BACKEND=pklr
    3. Per-command: HK_PKL_BACKEND=pklr hk check
    4. In CI: env: HK_PKL_BACKEND: pklr

  what_it_does: |
    Uses hk's built-in Rust pkl evaluator instead of requiring
    a separate pkl CLI installation. Status: experimental.
    Eliminates pkl CLI as a dependency.

  default: "pkl CLI (install via `mise use -g pkl`)"

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================

logging:
  levels:
    - "error: Only error messages"
    - "warn: Warnings and errors (DEFAULT)"
    - "info: Informational + warnings + errors"
    - "debug: File operations, step execution details"
    - "trace: All internal operations"

  cli_flags:
    - "-v / --verbose: DEBUG level"
    - "-vv: TRACE level"
    - "-q / --quiet: Suppress non-error output"
    - "--silent: Suppress all output, exit code only"

  env_vars:
    HK_LOG: "Control verbosity (debug, trace, info, warn, error)"
    HK_LOG_FILE: "Custom log file path (default: ~/.local/state/hk/hk.log)"
    HK_LOG_FILE_LEVEL: "Separate log level for file output"

  ensure_no_warnings_suppressed: |
    By default, log level is 'warn' which shows warnings.
    To ensure NO warnings are suppressed:
    1. Do NOT set hide_warnings in hk.pkl
    2. Do NOT set HK_HIDE_WARNINGS env var
    3. Optionally set HK_LOG=info for more visibility
    4. For CI, use HK_LOG=debug to capture everything

# ============================================================================
# VALIDATE IN CI
# ============================================================================

validate_in_ci:
  command: "hk validate"
  purpose: "Validates the hk.pkl config file for correctness (syntax + types)"

  ci_usage: |
    Add as a CI step to catch config errors before hooks run:

    # In .github/workflows/ci.yml:
    - name: Validate hk config
      run: hk validate

    # Or with full linting:
    - name: Lint (hk)
      run: |
        hk validate
        hk check --all

  when_to_run: |
    - On every PR that modifies hk.pkl
    - As part of CI lint stage
    - After upgrading hk version (amends URL changes)

# ============================================================================
# CONFIGURATION REFERENCE SUMMARY
# ============================================================================

configuration:
  file_search_order:
    - "hk.local.pkl (local overrides, gitignored)"
    - ".config/hk.local.pkl"
    - "hk.pkl (standard, committed)"
    - ".config/hk.pkl"
    - "Walks up to / checking each directory"
    - "Override with HK_FILE env var"

  precedence_lowest_to_highest:
    - "Built-in defaults"
    - "User config (~/.config/hk/config.pkl)"
    - "Project config (hk.pkl)"
    - "Git config"
    - "Environment variables (HK_*)"
    - "CLI flags"

  global_settings:
    default_branch: "String, auto-detects if unset"
    env: "Mapping of env vars for linters"
    exclude: "String/List/Regex, global exclude patterns"
    fail_fast: "Boolean, default true, abort after first failure"
    hide_warnings: "List of warning tags to suppress"
    jobs: "UInt, default 0 (auto-detect CPU cores)"
    profiles: "List, prefix with ! to disable"
    skip_hooks: "List of hook names to skip"
    skip_steps: "List of step names to skip"
    walk_ignore: "Boolean, default true, respect .gitignore"

  hook_settings:
    fix: "Boolean, run fix commands"
    stage: "Boolean, default true, auto-stage fixed files"
    stash: "StashMethod: git, patch-file, none, or boolean"
    env: "Mapping, hook-specific env vars"
    fail_on_fix: "Boolean, fail if fix modifies files"
    report: "String/Script, runs after hook with HK_REPORT_JSON"

  step_settings:
    file_matching:
      glob: "String/List/Regex"
      types: "List (python, javascript, shell, json, yaml, etc.)"
      allow_symlinks: "Boolean, default false"
      exclude: "String/List/Regex"
    commands:
      check: "Read-only validation command"
      fix: "Modification/auto-fix command"
      check_list_files: "Optimize fix by listing files needing fixes"
      check_diff: "Show diff instead of check result"
    execution:
      batch: "Boolean, run on file batches for parallelization"
      check_first: "Boolean, run check before fix"
      stomp: "Boolean, write lock instead of read lock"
      exclusive: "Boolean, wait for previous steps"
      depends: "String/List, steps that must finish first"
      workspace_indicator: "String, run per workspace (e.g. Cargo.toml)"
      prefix: "String, command prefix (e.g. npm run)"
      dir: "String, working directory"
      profiles: "List, enable for matching profiles only"
    template_vars:
      - "{{files}}: file list to process"
      - "{{workspace}}: workspace directory"
      - "{{workspace_indicator}}: matched indicator file"
      - "{{workspace_files}}: files relative to workspace"

  special_hooks:
    - "pre-commit: before commits"
    - "pre-push: before pushes"
    - "fix: hk fix command"
    - "check: hk check command"
    - "commit-msg: validate commit messages"
    - "prepare-commit-msg: modify commit messages"

  key_env_vars:
    HK_FILE: "Override config file path"
    HK_JOBS: "Parallel processes"
    HK_FIX: "Run fix commands"
    HK_CHECK: "Run only checks"
    HK_SKIP_STEPS: "Skip specific steps"
    HK_SKIP_HOOKS: "Skip entire hooks"
    HK_PROFILE: "Enable profiles"
    HK_EXCLUDE: "Exclude patterns"
    HK_STASH: "Stash strategy"
    HK_HIDE_WARNINGS: "Hide warning tags"
    HK_LOG_LEVEL: "Verbosity"
    HK_CACHE_DIR: "Cache directory"
    HK_STATE_DIR: "State files directory"
    HK_PKL_BACKEND: "pklr for built-in evaluator"
    HK_MISE: "1 to enable mise integration"
