title: "Define Phase Consensus: C++ Devcontainer Architecture"
date: 2026-03-28
type: consensus
providers:
  claude: "Approach B+ (composable BASE_IMAGE)"
  gemini: "Approach C (shared base image)"
  codex: "unavailable (TTY constraint)"

# ============================================================
# CONSENSUS: APPROACH B+ (Composable Base Image)
# ============================================================
#
# Gemini recommended C (shared base-compilers image).
# Claude observed that cpp-playground ALREADY publishes the compiler
# image to ghcr.io/ray-manaloto/cpp-devcontainer:dev.
# Therefore B+ achieves C's benefits without a third repo.
#
# DECISION: Composable Dockerfile with BASE_IMAGE build arg
#

consensus:
  approach: "B+ (Composable Base Image)"
  confidence: 90
  description: |
    The dotfiles Dockerfile accepts a BASE_IMAGE build arg:
    - Default: ubuntu:25.10 (minimal dev environment)
    - C++ mode: ghcr.io/ray-manaloto/cpp-devcontainer:dev (compilers + dev env)

    Dotfiles always apply chezmoi/mise/hk on top of whatever base.
    This achieves separation of concerns without a third repo.

  architecture:
    layers:
      1_base: "BASE_IMAGE (ubuntu:25.10 OR cpp-devcontainer GHCR image)"
      2_system: "APT snapshot pinning + minimal system deps (curl, git, zsh)"
      3_mise: "mise --system install for tools that survive volume mounts"
      4_chezmoi: "chezmoi init --apply for shell/tool/AI configs"
      5_user: "Non-root user with dynamic UID/GID + SSH setup"

    docker_bake:
      targets:
        - "base: minimal ubuntu + system deps"
        - "dev: base + mise + chezmoi (default dev environment)"
        - "cpp: FROM cpp-devcontainer + mise + chezmoi (C++ variant)"
      caching: "registry-backed via GHCR, BuildKit cache mounts"
      attestations: "SBOM + SLSA provenance"

    renovate_strategy:
      - "regex manager for BASE_IMAGE version/digest in docker-bake.hcl"
      - "docker:pinDigests for base images"
      - "pinDigests:false for devcontainer features"
      - "automerge minor/patch/digest"
      - "existing mise regex managers continue for tool versions"

    ci_cd:
      - "contract-preflight job (Dockerfile validation)"
      - "multi-target bake build (base, dev, cpp)"
      - "smoke tests in built images"
      - "image promotion to GHCR"
      - "weekly scheduled + PR-triggered"

# ============================================================
# IMPLEMENTATION PLAN
# ============================================================

implementation:
  wave_1_docker_foundation:
    title: "Docker Build Infrastructure"
    files:
      - path: ".devcontainer/Dockerfile"
        action: "rewrite"
        changes:
          - "Add syntax=docker/dockerfile:1.7 directive"
          - "Add ARG BASE_IMAGE=ubuntu:25.10"
          - "Add APT snapshot pinning"
          - "Add BuildKit cache mounts for apt, pip, mise"
          - "Use mise install --system"
          - "Multi-stage: base -> dev -> final"
      - path: "docker-bake.hcl"
        action: "create"
        changes:
          - "Define targets: base, dev, cpp"
          - "Registry caching"
          - "SBOM + provenance attestations"
      - path: ".devcontainer/devcontainer.json"
        action: "update"
        changes:
          - "Add Claude Code devcontainer feature"
          - "Add updateContentCommand for incremental rebuilds"
          - "Parallel lifecycle hook syntax"

  wave_2_quality_gates:
    title: "CI/CD & Security"
    files:
      - path: ".github/workflows/ci.yml"
        action: "rewrite"
        changes:
          - "Add contract-preflight job"
          - "Use docker bake for build"
          - "Add smoke test job"
          - "Add image promotion job"
      - path: "renovate.json"
        action: "update"
        changes:
          - "Add docker:pinDigests"
          - "Add pinDigests:false for devcontainer manager"
          - "Add automerge for minor/patch/digest"
      - path: "hk.pkl"
        action: "create"
        changes:
          - "gitleaks pre-commit"
          - "ruff check pre-commit"
          - "hadolint pre-commit"

  wave_3_polish:
    title: "Developer Experience"
    files:
      - path: "home/dot_config/mise/config.toml.tmpl"
        action: "update"
        changes:
          - "Add hk, just, hadolint, pkl tools"
          - "Add claude-code (official mise backend)"
      - path: "python/src/dotfiles_setup/docker.py"
        action: "update"
        changes:
          - "Support docker bake commands"
          - "Support target selection (dev vs cpp)"
