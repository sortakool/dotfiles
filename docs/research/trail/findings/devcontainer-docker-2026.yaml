  # ─── 5. MISE IN DOCKER ─────────────────────────────────────────────
  mise_in_docker:
    summary: |
      mise replaces asdf/rtx for tool version management. Critical Docker
      gotcha: home directory mounts hide tools installed during build.
    installation_patterns:
      copy_from_official_image: |
        COPY --from=jdxcode/mise /usr/local/bin/mise /usr/local/bin/mise
      install_script: |
        RUN curl https://mise.run | sh
      devcontainer_feature: |
        Available as a community devcontainer feature
    critical_gotcha: |
      Devcontainers mount the user's home directory, which HIDES tools
      installed during docker build into ~/.local/share/mise/installs.
      SOLUTION: Use `mise install --system` to install to
      /usr/local/share/mise/installs (outside ~ so it survives mounts).
    best_practices:
      - "Use mise.toml at project root for reproducible tool versions"
      - "In Dockerfile: mise install --system to persist tools outside ~"
      - "In postCreateCommand: mise install for user-level tools after mount"
      - "Copy mise binary from official image for faster builds"
      - "Same mise.toml drives both local dev and CI/CD"
    cookbook: "https://mise.jdx.dev/mise-cookbook/docker.html"
    sources:
      - https://mise.jdx.dev/mise-cookbook/docker.html
      - https://rezachegini.com/2025/10/14/mise-and-dev-containers-simple-setup-guide/
      - https://sreake.com/en/blog/stop-worrying-about-ai-wrecking-your-code-a-template-for-unified-development-environments-using-dev-containers-and-mise/
      - https://medium.com/@pedrotychang/my-reproducible-developer-environment-chezmoi-mise-devcontainers-omnictl-aa27740a0acf

  # ─── 6. CHEZMOI IN DOCKER ──────────────────────────────────────────
  chezmoi_in_docker:
    summary: |
      chezmoi bootstraps dotfiles in containers. The pattern is:
      chezmoi init -> install mise (if missing) -> apply dotfiles -> mise install.
    patterns:
      devcontainer_postCreateCommand: |
        chezmoi init --apply runs in postCreateCommand to bootstrap dotfiles
        after the container is created and home directory is mounted.
      docker_command: |
        chezmoi docker <image-id> [-- init-args]
        Creates container, installs chezmoi, runs chezmoi init --apply, opens shell.
      github_codespaces: |
        VS Code Codespaces/Devcontainers natively support dotfiles repos.
        Set dotfiles.repository in VS Code settings or GitHub Codespaces config.
      devpod_integration: |
        DevPod supports dotfiles natively, linking container with IDE.
    architecture: |
      .devcontainer/
        devcontainer.json  (references Dockerfile + dotfiles repo)
        Dockerfile         (base image + system deps)
      chezmoi run order:
        1. chezmoi init --apply (dotfiles, shell config, tool config)
        2. mise install (tools from mise.toml, bootstrapped by chezmoi)
        3. postStartCommand hooks for session-specific setup
    sources:
      - https://www.chezmoi.io/reference/commands/docker/
      - https://www.chezmoi.io/user-guide/machines/containers-and-vms/
      - https://medium.com/@pedrotychang/my-reproducible-developer-environment-chezmoi-mise-devcontainers-omnictl-aa27740a0acf
      - https://alfonsofortunato.com/projects/devpod-dotfiles-chezmoi/

  # ─── 7. HK (GIT HOOKS) ────────────────────────────────────────────
  hk_git_hooks:
    summary: |
      hk is a Rust-based git hook manager by jdx (mise author). Uses Pkl
      for config. Key differentiator: read/write file locks for safe
      parallel linting (no race conditions).
    key_features:
      - "Read/write file locks: multiple linters run in parallel safely"
      - "Rust-native builtins: trailing whitespace, EOF fixing, merge conflict detection"
      - "Pkl configuration format (hk.pkl)"
      - "Deep mise integration (tool versions, env vars, task deps)"
      - "Tighter linter integration than pre-commit/lefthook"
    pkl_config_example: |
      amends "https://hk.jdx.dev/hk.pkl"
      hooks {
        ["pre-commit"] {
          linters {
            ["ruff"] { glob = "*.py"; run = "ruff check --fix {files}" }
            ["prettier"] { glob = "*.{ts,js,json}"; run = "prettier --write {files}" }
          }
        }
      }
    mise_integration: |
      - mise manages tool versions used in hk.pkl
      - mise provides env vars and task dependencies
      - hk + mise = hooks + tools in one declarative stack
    comparison:
      vs_lefthook: "hk has file locks for safe parallel writes; lefthook does not"
      vs_pre_commit: "hk is faster (Rust), has builtins, uses Pkl not YAML"
      vs_husky: "hk is language-agnostic, not Node.js specific"
    recent_updates: |
      - Deprecated Types.pkl removed, simplifying configuration
      - Monorepo task support landed in mise (Oct 2025)
      - hk continues active development as companion to mise
    sources:
      - https://hk.jdx.dev/getting_started
      - https://hk.jdx.dev/configuration.html
      - https://hk.jdx.dev/mise_integration.html
      - https://hk.jdx.dev/pkl_introduction.html
      - https://github.com/jdx/hk
      - https://github.com/jdx/mise/discussions/4434

  # ─── 8. SUPPLY CHAIN SECURITY ──────────────────────────────────────
  supply_chain_security:
    summary: |
      The 2026 standard: sign images with Cosign, generate SBOM with Trivy/Syft,
      store attestations as OCI artifacts, verify at deploy time.
    stack:
      signing: "Cosign (Sigstore) - identity-based signing with ephemeral keys"
      sbom: "Trivy, Syft, Docker Scout - SPDX or CycloneDX format"
      attestation: "OCI Attestations (subject + predicate, cryptographically verifiable)"
      verification: "Cosign verify + admission controllers (Kyverno/OPA)"
      scanning: "Trivy, Grype, Docker Scout, Snyk"
    best_practices:
      - "Generate SBOM for every image build"
      - "Store SBOM + provenance as attestations tied to image digest"
      - "Use identity-based signing (no developer-managed keys)"
      - "Reference images by digest, not tag (required for correct attestation)"
      - "Scan at every CI/CD pipeline stage"
      - "Use minimal base images (Alpine, distroless)"
      - "Enforce admission controllers to block unsigned/non-compliant images"
      - "SLSA provenance for build reproducibility"
    ci_pipeline_pattern: |
      1. Build image with BuildKit
      2. Generate SBOM (trivy image --format spdx-json)
      3. Sign image (cosign sign --identity-token)
      4. Attach SBOM attestation (cosign attest --predicate sbom.json)
      5. Push to registry
      6. At deploy: cosign verify + policy check
    sources:
      - https://docs.docker.com/dhi/core-concepts/signatures/
      - https://edu.chainguard.dev/open-source/sigstore/cosign/how-to-sign-an-sbom-with-cosign/
      - https://bell-sw.com/blog/docker-image-security-best-practices-for-production/
      - https://trivy.dev/docs/latest/supply-chain/attestation/sbom/
      - https://sbomify.com/guides/docker/

  # ─── 9. BUILD CACHING ──────────────────────────────────────────────
  build_caching:
    summary: |
      BuildKit cache mounts + registry-backed caching = 70-90% build time reduction.
      Cache mounts persist package manager caches even when layers invalidate.
    cache_mount_types:
      bind_mount: "Temporarily mount source without adding layers"
      cache_mount: "RUN --mount=type=cache,target=/root/.cache/pip pip install -r requirements.txt"
      secret_mount: "RUN --mount=type=secret,id=mysecret cat /run/secrets/mysecret"
    registry_backed_caching:
      export: "docker buildx build --push --cache-to type=registry,ref=myregistry.com/myapp:cache"
      import: "docker buildx build --cache-from type=registry,ref=myregistry.com/myapp:cache"
      use_case: "CI/CD with ephemeral builders (GitHub Actions, etc.)"
    cache_mount_examples:
      pip: "RUN --mount=type=cache,target=/root/.cache/pip pip install -r requirements.txt"
      npm: "RUN --mount=type=cache,target=/root/.npm npm ci"
      apt: "RUN --mount=type=cache,target=/var/cache/apt apt-get install -y gcc"
      go: "RUN --mount=type=cache,target=/go/pkg/mod go build ./..."
      cargo: "RUN --mount=type=cache,target=/usr/local/cargo/registry cargo build --release"
      mise: "RUN --mount=type=cache,target=/root/.local/share/mise mise install"
    optimization_rules:
      - "Place least-changing layers first (OS -> deps -> code)"
      - "Use cache mounts for package manager directories"
      - "Use bind mounts for source code needed only at build time"
      - "Use registry-backed cache for CI/CD (ephemeral builders)"
      - "Combine RUN commands to reduce layer count"
      - "Use .dockerignore to exclude unnecessary context"
    performance: "70-90% build time reduction with proper caching strategy"
    sources:
      - https://docs.docker.com/build/cache/optimize/
      - https://eastondev.com/blog/en/posts/dev/20251217-docker-build-cache/
      - https://dockerbuild.com/reference/layer-caching
      - https://tech.sparkfabrik.com/en/blog/docker-cache-deep-dive/
      - https://www.netdata.cloud/academy/docker-layer-caching/
