  # ─── 1. DEVCONTAINER SPEC ───────────────────────────────────────────
  devcontainer_spec:
    summary: |
      The devcontainer.json spec continues to mature with lifecycle hooks
      and the Features system as the two major extension points.
    lifecycle_hooks:
      order:
        - initializeCommand    # runs on host before container starts
        - onCreateCommand      # first container creation only
        - updateContentCommand # creation + content updates
        - postCreateCommand    # after updateContentCommand
        - postStartCommand     # every container start
        - postAttachCommand    # every client attach
      notes: |
        Each hook accepts a string, array, or object (parallel execution).
        Commands run from workspaceFolder by default.
    features_system:
      distribution: "OCI Artifacts in any OCI-compliant registry (GHCR recommended)"
      versioning: "semver via devcontainer-feature.json"
      packaging: "tarballs containing install.sh + devcontainer-feature.json"
      naming: "<registry>/<namespace>/<id>[:version]"
      starter_repo: "https://github.com/devcontainers/feature-starter"
      catalog: "https://containers.dev/features"
      key_insight: |
        Features are composable units of container tooling. Major vendors
        (Anthropic, Google, etc.) now publish official devcontainer features
        via GHCR. Custom features use GitHub Actions for automated publishing.
    known_issues:
      - "Renovate digest pinning for features breaks VSCode (features don't support hash pinning)"
    sources:
      - https://containers.dev/implementors/json_reference/
      - https://containers.dev/implementors/features/
      - https://github.com/devcontainers/spec
      - https://github.com/devcontainers/features
      - https://ivanlee.me/devcontainers-in-2025-a-personal-take/

  # ─── 2. DOCKER MULTI-STAGE BUILDS ──────────────────────────────────
  docker_multi_stage:
    summary: "Build fat, ship thin. Separate build and runtime images."
    best_practices:
      - "Name stages with AS for clarity (FROM golang:1.22 AS builder)"
      - "Order layers by change frequency (deps before code)"
      - "Copy only necessary artifacts via COPY --from=builder"
      - "Use distroless or scratch for runtime (no shell, no pkg manager)"
      - "Run as non-root with dedicated USER"
      - "Run tests in a dedicated test stage"
      - "Execute build steps in parallel across stages"
    size_reductions:
      go: "1.1GB -> 8MB (99%)"
      rust: "1.4GB -> 5MB (99%)"
      nodejs: "1.2GB -> 150MB (87%)"
      python: "1.0GB -> 180MB (82%)"
    dev_environment_pattern: |
      Use a full "dev" stage with compilers/debuggers/linters that is
      NOT the final stage. The dev stage is used by devcontainers;
      the final slim stage is used for production.
      Example:
        FROM ubuntu:24.04 AS base
        FROM base AS dev       # compilers, linters, mise, chezmoi
        FROM base AS builder   # compile the app
        FROM gcr.io/distroless/static AS runtime  # production
    sources:
      - https://docs.docker.com/build/building/multi-stage/
      - https://docs.docker.com/build/building/best-practices/
      - https://devtoolbox.dedyn.io/blog/docker-multi-stage-builds-guide
      - https://oneuptime.com/blog/post/2026-02-02-docker-multi-stage-builds/view

  # ─── 3. RENOVATE FOR DOCKER ────────────────────────────────────────
  renovate_docker:
    summary: |
      Renovate auto-updates Docker base images, tags, and digests.
      Digest pinning is the gold standard for reproducibility.
    recommended_config: |
      {
        "$schema": "https://docs.renovatebot.com/renovate-schema.json",
        "extends": ["config:recommended", "docker:pinDigests"],
        "packageRules": [
          {
            "groupName": "all non-major dependencies",
            "matchUpdateTypes": ["minor", "patch", "digest"],
            "automerge": true
          },
          {
            "description": "Disable digest pinning for devcontainer features (VSCode incompatible)",
            "matchManagers": ["devcontainer"],
            "pinDigests": false
          }
        ]
      }
    capabilities:
      - "Updates FROM directives including multi-stage builds"
      - "Digest pinning: node:14 -> node:14@sha256:..."
      - "Tag version bumps: myimage:1.2.0 -> myimage:1.2.1"
      - "Auto-merge for minor/patch/digest updates"
      - "Works with docker-compose, Kubernetes manifests, Helm charts"
    gotcha: |
      devcontainer feature hash pinning is NOT supported by VSCode.
      Use pinDigests:false for the devcontainer manager specifically.
    sources:
      - https://docs.renovatebot.com/docker/
      - https://docs.renovatebot.com/modules/manager/dockerfile/
      - https://emmer.dev/blog/keep-docker-base-images-updated-with-renovate/
      - https://github.com/renovatebot/renovate/discussions/28767

