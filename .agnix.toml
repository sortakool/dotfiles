severity = "Warning"
exclude = [
    "node_modules/**",
    ".git/**",
    ".codex/**",
    ".omx/**",
    ".omc/**",
    ".omg/**",
    ".logging/**",
    "plugins/**",
    "missions/**",
    ".claude/skills.bak/**",
]
tools = ["claude-code"]
