[meta]
version = "2"

# =============================================================================
# Build Constraints (~15) — Dockerfile structure and correctness
# =============================================================================

[[suite]]
name = "build.no-custom-mise-data-dir"
description = "Base image should rely on mise system/default data paths instead of custom MISE_DATA_DIR"
category = "build"
check_type = "static"
handler = "forbid_tokens"
paths = [".devcontainer/Dockerfile"]
tokens = ["MISE_DATA_DIR="]
allowlist = ["^\\s*ENV\\s"]

[[suite]]
name = "build.mise-install-path-system"
description = "Base image should install the mise binary system-wide"
category = "build"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/Dockerfile"]
tokens = ["MISE_INSTALL_PATH=/usr/local/bin/mise"]

[[suite]]
name = "build.no-custom-mise-cache-dir"
description = "Base image should rely on default cache locations instead of custom MISE_CACHE_DIR"
category = "build"
check_type = "static"
handler = "forbid_tokens"
paths = [".devcontainer/Dockerfile"]
tokens = ["MISE_CACHE_DIR="]

[[suite]]
name = "build.home-not-root"
description = "HOME must not be /root in tools or devcontainer stage"
category = "build"
check_type = "static"
handler = "regex_forbid"
paths = [".devcontainer/Dockerfile"]
pattern = '^\s*ENV\s.*HOME=/root\b'

[[suite]]
name = "build.no-warning-suppression"
description = "Never suppress mise warnings"
category = "build"
check_type = "static"
handler = "forbid_tokens"
paths = [".devcontainer/Dockerfile", "install.sh", ".github/workflows/ci.yml"]
tokens = ["MISE_QUIET", "MISE_LOG_LEVEL=warn", "MISE_LOG_LEVEL=error"]

[[suite]]
name = "build.no-stderr-suppression"
description = "No blanket stderr suppression (2>/dev/null) except mise trust"
category = "build"
check_type = "static"
handler = "forbid_tokens"
paths = [".devcontainer/Dockerfile", "install.sh"]
tokens = ["2>/dev/null"]
allowlist = ["mise trust", "\\$MISE trust"]

[[suite]]
name = "build.cache-mount-sharing-locked"
description = "All cache mounts must use sharing=locked"
category = "build"
check_type = "static"
handler = "regex_forbid"
paths = [".devcontainer/Dockerfile"]
pattern = '--mount=type=cache(?!.*sharing=locked).*target='

[[suite]]
name = "build.no-mise-data-cache-mount"
description = "Custom mise data dir must not be a cache mount (tools vanish from image)"
category = "build"
check_type = "static"
handler = "regex_forbid"
paths = [".devcontainer/Dockerfile"]
pattern = 'target=.*/mise/installs?[,\s]'

[[suite]]
name = "build.buildkit-syntax"
description = "BuildKit syntax directive required on first line"
category = "build"
check_type = "static"
handler = "regex_match"
paths = [".devcontainer/Dockerfile"]
pattern = '^#\s*syntax=docker/dockerfile'

[[suite]]
name = "build.openssh-not-in-base"
description = "openssh-server must not be in base Dockerfile (overlay only)"
category = "build"
check_type = "static"
handler = "forbid_tokens"
paths = [".devcontainer/Dockerfile"]
tokens = ["openssh-server"]

[[suite]]
name = "build.amd64-platform-wired"
description = "R3 AMD64: devcontainer must build and run as linux/amd64/v2 x86_64. Required tokens: --platform=linux/amd64/v2 in devcontainer.json build.options (Dockerfile build arg). Runtime arch is additionally verified by `mise run verify-arch` via docker image inspect + uname -m + arch, which runs as part of verify-local. See AGENTS.md SSH Requirements section (R3)."
category = "build"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/devcontainer.json"]
tokens = [
    "--platform=linux/amd64/v2",
]

[[suite]]
name = "build.ssh-r1-inbound-wired"
description = "R1 INBOUND: ssh ${USER}@localhost -p 4444 opens a shell in the container. Requires: (1) the ghcr.io/devcontainers/features/sshd feature (provides openssh-server, internal port 2222 hardcoded); (2) appPort mapping ${DEVCONTAINER_SSH_PORT}:2222; (3) postCreateCommand copies /tmp/dotfiles-host-state/authorized_keys into ~/.ssh/authorized_keys. DO NOT DROP — see AGENTS.md SSH Requirements section and .omc/plans/session-2026-04-09-ssh-rewrite.md."
category = "build"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/devcontainer.json"]
tokens = [
    "ghcr.io/devcontainers/features/sshd",
    "${localEnv:DEVCONTAINER_SSH_PORT}:2222",
    "authorized_keys",
]

[[suite]]
name = "build.ssh-r2-outbound-native-docker-desktop-wired"
description = "R2 OUTBOUND: ssh -T git@github.com inside the container reaches the host launchd SSH agent via Docker Desktop's native /run/host-services/ssh-auth.sock magic socket. Requires: (1) devcontainer.json bind-mounts /run/host-services/ssh-auth.sock; (2) containerEnv.SSH_AUTH_SOCK points at /run/host-services/ssh-auth.sock; (3) initializeCommand still writes authorized_keys (for R1 orthogonally). Research: .omc/research/research-20260409c-dockerdesktop-ssh/report.md. Runtime pin: Docker Desktop only — Colima has no equivalent (abiosoft/colima#1330, #942), tracked for follow-up in issue #78."
category = "build"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/devcontainer.json"]
tokens = [
    "source=/run/host-services/ssh-auth.sock",
    "target=/run/host-services/ssh-auth.sock",
    "\"SSH_AUTH_SOCK\": \"/run/host-services/ssh-auth.sock\"",
    "dotfiles-setup docker initialize-host",
]

[[suite]]
name = "build.uv-link-mode-not-global"
description = "UV_LINK_MODE=copy must not be a global ENV (breaks runtime)"
category = "build"
check_type = "static"
handler = "regex_forbid"
paths = [".devcontainer/Dockerfile"]
pattern = '^\s*ENV\s.*UV_LINK_MODE'

[[suite]]
name = "build.base-image-arg"
description = "ARG BASE_IMAGE must exist for composability"
category = "build"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/Dockerfile"]
tokens = ["ARG BASE_IMAGE"]


[[suite]]
name = "build.gnupg-installed"
description = "gnupg must be in apt-get install for mise signature verification"
category = "build"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/Dockerfile"]
tokens = ["gnupg"]

[[suite]]
name = "build.npm-no-update-notifier"
description = "npm_config_update_notifier=false set in mise-system.toml to suppress build notices"
category = "build"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/mise-system.toml"]
tokens = ['npm_config_update_notifier = "false"']

[[suite]]
name = "build.path-includes-mise-shims"
description = "Overlay/runtime paths must include the default per-user mise shims path"
category = "build"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/Dockerfile.host-user", ".devcontainer/devcontainer.json", "home/.chezmoi.toml.tmpl"]
tokens = [".local/share/mise/shims"]

[[suite]]
name = "build.no-custom-cargo-home"
description = "Base image must not pin standard CARGO_HOME (runtime users get ~/.cargo via named volume per rust cookbook). MISE_CARGO_HOME for build-time isolation is allowed."
category = "build"
check_type = "static"
handler = "forbid_tokens"
paths = [".devcontainer/Dockerfile"]
# Leading space anchors the token to a fresh ENV line, so MISE_CARGO_HOME=
# (preceded by `MISE_`, not whitespace) does NOT false-positive.
tokens = [" CARGO_HOME="]

[[suite]]
name = "build.no-custom-rustup-home"
description = "Base image must not pin standard RUSTUP_HOME (runtime users get ~/.rustup via named volume per rust cookbook). MISE_RUSTUP_HOME for build-time isolation is allowed."
category = "build"
check_type = "static"
handler = "forbid_tokens"
paths = [".devcontainer/Dockerfile"]
# Leading space anchors the token to a fresh ENV line, so MISE_RUSTUP_HOME=
# (preceded by `MISE_`, not whitespace) does NOT false-positive.
tokens = [" RUSTUP_HOME="]

[[suite]]
name = "build.no-custom-gopath"
description = "Base image should rely on default Go locations instead of custom GOPATH"
category = "build"
check_type = "static"
handler = "forbid_tokens"
paths = [".devcontainer/Dockerfile"]
tokens = ["GOPATH=", "GOBIN=", "GOMODCACHE=", "GOCACHE="]

[[suite]]
name = "build.no-custom-npm-prefix"
description = "Base image should rely on default npm locations instead of custom NPM_CONFIG_PREFIX"
category = "build"
check_type = "static"
handler = "forbid_tokens"
paths = [".devcontainer/Dockerfile"]
tokens = ["NPM_CONFIG_PREFIX=", "NPM_CONFIG_CACHE="]

[[suite]]
name = "build.home-opt-home"
description = "Base image must not stage a fake /opt/home build user"
category = "build"
check_type = "static"
handler = "forbid_tokens"
paths = [".devcontainer/Dockerfile"]
tokens = ["/opt/home"]

[[suite]]
name = "build.no-xdg-in-tools-stage"
description = "XDG_DATA_HOME/XDG_CACHE_HOME must not be in Dockerfile"
category = "build"
check_type = "static"
handler = "forbid_tokens"
paths = [".devcontainer/Dockerfile"]
tokens = ["XDG_DATA_HOME", "XDG_CACHE_HOME"]

[[suite]]
name = "build.manpage-restore-sed-syntax"
description = "Base image must remove the manpage path exclusion with a valid exact-line sed expression"
category = "build"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/Dockerfile"]
tokens = ["sed -i '/^path-exclude=\\/usr\\/share\\/man\\/\\*$/d' /etc/dpkg/dpkg.cfg.d/excludes"]

[[suite]]
name = "build.rustup-skip-path-check"
description = "mise env must disable rustup PATH checks during non-interactive installs"
category = "build"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/mise-system.toml"]
tokens = ['RUSTUP_INIT_SKIP_PATH_CHECK = "yes"']

[[suite]]
name = "build.gcc-latest-reflection"
description = "GCC-16 with P2996 reflection must be installed via precompiled .deb"
category = "build"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/Dockerfile"]
tokens = ["gcc-latest.deb", "/opt/gcc-latest/bin/g++", "-freflection"]

[[suite]]
name = "build.clang-p2996-reflection"
description = "Bloomberg clang-p2996 must be built from source in clang-builder stage"
category = "build"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/Dockerfile"]
tokens = ["clang-p2996", "CLANG_P2996_REF", "COPY --from=clang-builder"]

[[suite]]
name = "build.clang-p2996-ref-in-bake"
description = "CLANG_P2996_REF must be wired through docker-bake.hcl for cache invalidation"
category = "build"
check_type = "static"
handler = "require_tokens"
paths = ["docker-bake.hcl"]
tokens = ["CLANG_P2996_REF"]

[[suite]]
name = "build.doppler-secrets-wired"
description = "S1 SECRETS: Doppler secrets injected via --env-file in runArgs. initializeCommand downloads secrets to staging area; runArgs passes the env file to docker run. DO NOT DROP — see AGENTS.md Secrets Injection section."
category = "build"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/devcontainer.json"]
tokens = [
    "--env-file",
    "doppler.env",
    "doppler secrets download",
]

# =============================================================================
# CI Constraints (~6) — Workflow correctness
# =============================================================================

[[suite]]
name = "ci.sbom-attestation"
description = "SBOM attestation required in bake config"
category = "ci"
check_type = "static"
handler = "require_tokens"
paths = ["docker-bake.hcl"]
tokens = ["type=sbom"]

[[suite]]
name = "ci.provenance-attestation"
description = "Provenance attestation required in bake config"
category = "ci"
check_type = "static"
handler = "require_tokens"
paths = ["docker-bake.hcl"]
tokens = ["type=provenance"]

[[suite]]
name = "ci.no-mise-data-in-cache-map"
description = "mise-data must not be in buildkit-cache-dance cache-map"
category = "ci"
check_type = "static"
handler = "regex_forbid"
paths = [".github/workflows/ci.yml"]
pattern = '"mise-data"'

[[suite]]
name = "ci.gha-cache-enabled"
description = "Buildx gha cache must remain enabled in bake config"
category = "ci"
check_type = "static"
handler = "require_tokens"
paths = ["docker-bake.hcl"]
tokens = ["type=gha,scope=dotfiles-dev"]

[[suite]]
name = "ci.no-actions-cache-workaround"
description = "Workflow must not use the deprecated actions/cache workaround for BuildKit mounts"
category = "ci"
check_type = "static"
handler = "forbid_tokens"
paths = [".github/workflows/ci.yml"]
tokens = ["actions/cache/restore", "actions/cache/save", "buildkit-cache-dance"]

[[suite]]
name = "ci.unconditional-ghcr-login"
description = "GHCR login must not be conditional on event type"
category = "ci"
check_type = "static"
handler = "regex_forbid"
paths = [".github/workflows/ci.yml"]
pattern = "if:.*github\\.event_name.*!=.*pull_request"

[[suite]]
name = "ci.image-name-dotfiles-devcontainer"
description = "CI must publish the dotfiles-devcontainer image"
category = "ci"
check_type = "static"
handler = "require_tokens"
paths = [".github/workflows/ci.yml"]
tokens = ["ray-manaloto/dotfiles-devcontainer"]

[[suite]]
name = "ci.explicit-packages-write"
description = "CI workflow must explicitly request packages: write for GHCR publishing"
category = "ci"
check_type = "static"
handler = "require_tokens"
paths = [".github/workflows/ci.yml"]
tokens = ["packages: write"]

[[suite]]
name = "ci.pr-builds-do-not-push"
description = "Only main-branch and scheduled builds may publish GHCR images"
category = "ci"
check_type = "static"
handler = "require_tokens"
paths = [".github/workflows/ci.yml"]
tokens = ["push: ${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}"]

[[suite]]
name = "ci.smoke-test-skips-pr"
description = "Registry-backed smoke tests must only run when CI published an image"
category = "ci"
check_type = "static"
handler = "require_tokens"
paths = [".github/workflows/ci.yml"]
tokens = ["if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'"]

# =============================================================================
# Identity Constraints (~6) — User/group handling
# =============================================================================

[[suite]]
name = "identity.no-vscode-user"
description = "No vscode username references in Docker/devcontainer files"
category = "identity"
check_type = "static"
handler = "forbid_tokens"
paths = [
    ".devcontainer/Dockerfile",
    ".devcontainer/Dockerfile.host-user",
    ".devcontainer/devcontainer.json",
    "docker-bake.hcl",
    "install.sh",
    ".github/workflows/ci.yml",
]
tokens = ["vscode"]
allowlist = ["\"vscode\"\\s*:", "ms-vscode", "vscode-clangd", "vscode-pylance"]

[[suite]]
name = "identity.user-env-set"
description = "USER env var must be set in overlay"
category = "identity"
check_type = "static"
handler = "regex_match"
paths = [".devcontainer/Dockerfile.host-user"]
pattern = 'USER=\$\{?DEVCONTAINER_USERNAME\}?'

[[suite]]
name = "identity.logname-env-set"
description = "LOGNAME env var must be set in overlay"
category = "identity"
check_type = "static"
handler = "regex_match"
paths = [".devcontainer/Dockerfile.host-user"]
pattern = 'LOGNAME=\$\{?DEVCONTAINER_USERNAME\}?'

[[suite]]
name = "identity.workdir-set"
description = "WORKDIR must reference DEVCONTAINER_USERNAME"
category = "identity"
check_type = "static"
handler = "regex_match"
paths = [".devcontainer/Dockerfile.host-user"]
pattern = 'WORKDIR\s+/home/\$\{?DEVCONTAINER_USERNAME\}?'

[[suite]]
name = "identity.stale-sudoers-cleanup"
description = "Stale sudoers entry must be removed before creating new one"
category = "identity"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/Dockerfile.host-user"]
tokens = ["rm -f /etc/sudoers.d/devcontainer"]

[[suite]]
name = "identity.username-validation"
description = "Username validation must check empty, root, and invalid chars"
category = "identity"
check_type = "static"
handler = "regex_match"
paths = [".devcontainer/Dockerfile.host-user"]
pattern = 'DEVCONTAINER_USERNAME.*=.*"root"'

# =============================================================================
# Architecture Constraints (~4) — Structural invariants
# =============================================================================

[[suite]]
name = "arch.devcontainer-remote-user-dynamic"
description = "remoteUser must use localEnv:USER, not hardcoded"
category = "architecture"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/devcontainer.json"]
tokens = ["${localEnv:USER}"]

[[suite]]
name = "arch.base-image-dockerfile-host-user"
description = "Host-user overlay Dockerfile must use the fully-qualified ghcr.io base image tag"
category = "architecture"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/Dockerfile.host-user"]
tokens = ["ghcr.io/ray-manaloto/dotfiles-devcontainer:dev"]

[[suite]]
name = "arch.devcontainer-json-base-image-localenv"
description = "devcontainer.json must pass BASE_IMAGE via localEnv so CI can inject SHA-pinned tags while local dev uses the mise-provided default"
category = "architecture"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/devcontainer.json"]
tokens = ["${localEnv:BASE_IMAGE}"]

[[suite]]
name = "arch.devcontainer-json-no-bare-image-tag"
description = "devcontainer.json must not hardcode a bare (unqualified) dotfiles-devcontainer tag — that would shadow the mise/CI BASE_IMAGE override and pull from Docker Hub in CI"
category = "architecture"
check_type = "static"
handler = "regex_forbid"
paths = [".devcontainer/devcontainer.json"]
pattern = "\"dotfiles-devcontainer:"

[[suite]]
name = "arch.update-remote-user-uid-disabled"
description = "updateRemoteUserUID must be disabled because the overlay owns identity"
category = "architecture"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/devcontainer.json"]
tokens = ["\"updateRemoteUserUID\": false"]

[[suite]]
name = "arch.no-mise-home-volume"
description = "No mise-home volume mount (mise is image-baked at /usr/local/share/mise)"
category = "architecture"
check_type = "static"
handler = "forbid_tokens"
paths = [".devcontainer/devcontainer.json"]
tokens = ["mise-home"]

[[suite]]
name = "arch.mise-strict-in-container"
description = "MISE_STRICT=1 must be set in containerEnv"
category = "architecture"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/devcontainer.json"]
tokens = ["MISE_STRICT"]

[[suite]]
name = "arch.npm-package-manager-bun"
description = "npm-backed installs must use bun via mise settings"
category = "architecture"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/mise-system.toml"]
tokens = ["npm.package_manager = \"bun\""]

[[suite]]
name = "arch.pipx-uses-uvx"
description = "pipx-backed installs must use uvx via mise settings"
category = "architecture"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/mise-system.toml"]
tokens = ["pipx.uvx = true"]

[[suite]]
name = "arch.cargo-uses-binstall"
description = "cargo-backed installs must prefer cargo-binstall (enforced in devcontainer system mise config)"
category = "architecture"
check_type = "static"
handler = "require_tokens"
paths = [".devcontainer/mise-system.toml"]
tokens = ["cargo.binstall = true"]

# =============================================================================
# Policy Constraints (~4) — Human-only, not automatable
# =============================================================================

[[suite]]
name = "policy.zero-warning"
description = "Every warning must be fixed at root cause, never suppressed"
category = "policy"
check_type = "policy"
handler = "policy_doc"
reference = ".claude/rules/zero-skip-policy.md"

[[suite]]
name = "policy.research-before-fixing"
description = "Research root cause before attempting fixes"
category = "policy"
check_type = "policy"
handler = "policy_doc"
reference = ".claude/rules/zero-skip-policy.md"

[[suite]]
name = "policy.no-suppression-without-approval"
description = "No ignore rules without explicit user approval"
category = "policy"
check_type = "policy"
handler = "policy_doc"
reference = ".claude/rules/zero-skip-policy.md"

[[suite]]
name = "policy.worktree-pr-workflow"
description = "Verify on feature branch, never merge to main for testing"
category = "policy"
check_type = "policy"
handler = "policy_doc"
reference = "CLAUDE.md"
