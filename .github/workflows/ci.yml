name: CI

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight
  push:
    branches: [main]
    paths:
      - '.devcontainer/**'
      - 'docker-bake.hcl'
      - 'home/**'
      - 'python/**'
      - 'install.sh'
      - '.github/workflows/ci.yml'
      - 'hk.pkl'
      - 'renovate.json'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Bake target (dev, cpp, all)'
        required: false
        default: 'dev'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-devcontainer

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Validate hk config
        run: hk validate
        env:
          HK_PKL_BACKEND: pklr
          HK_LOG: debug

      - name: Check for outdated tools
        run: mise outdated || true

  contract-preflight:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate Dockerfile contracts
        run: |
          set -euo pipefail
          echo "--- Checking Dockerfile syntax directive ---"
          head -1 .devcontainer/Dockerfile | grep -q 'syntax=docker/dockerfile' || \
            { echo "FAIL: Missing BuildKit syntax directive"; exit 1; }

          echo "--- Checking APT snapshot pinning ---"
          grep -q 'APT_SNAPSHOT' .devcontainer/Dockerfile || \
            { echo "FAIL: Missing APT_SNAPSHOT build arg"; exit 1; }

          echo "--- Checking BASE_IMAGE composability ---"
          grep -q 'ARG BASE_IMAGE' .devcontainer/Dockerfile || \
            { echo "FAIL: Missing BASE_IMAGE build arg"; exit 1; }

          echo "--- Checking docker-bake.hcl exists ---"
          test -f docker-bake.hcl || \
            { echo "FAIL: Missing docker-bake.hcl"; exit 1; }

          echo "--- Checking SBOM attestation ---"
          grep -q 'type=sbom' docker-bake.hcl || \
            { echo "FAIL: Missing SBOM attestation in bake config"; exit 1; }

          echo "All contracts passed."

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: .devcontainer/Dockerfile

  build-dev:
    needs: contract-preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
            type=ref,event=pr

      - name: Build and push (dev target)
        uses: docker/bake-action@v7
        with:
          targets: dev
          push: true
          set: |
            dev.tags=${{ steps.meta.outputs.tags }}
            dev.labels=${{ steps.meta.outputs.labels }}

  validate-setup:
    needs: build-dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv (pinned)
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.2"

      - name: Run validation in built image
        run: |
          export DOTFILES_IMAGE="ghcr.io/${{ github.repository }}-devcontainer:${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'latest' }}"
          cd python
          uv run dotfiles-setup docker up
          uv run dotfiles-setup docker test
          uv run dotfiles-setup docker down
