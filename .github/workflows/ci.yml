name: CI

on:
  schedule:
    - cron: "0 0 * * *" # Daily midnight America/Chicago
      timezone: "America/Chicago"
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - "docker-bake.hcl"
      - "home/**"
      - "python/**"
      - "install.sh"
      - ".github/workflows/ci.yml"
      - "hk.pkl"
      - "hk-image.pkl"
      - "hk-common.pkl"
      - "renovate.json"

  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Bake target (dev, cpp, all)"
        required: false
        default: "dev"
      force_dev_tag:
        description: "Tag the build as :dev / :latest (used by promote fallback for direct-to-main pushes without an associated PR)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CONTAINER_REGISTRY: ghcr.io
  IMAGE_NAME: ray-manaloto/dotfiles-devcontainer
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Workflow-wide logging defaults so failed runs are diagnosable from
  # the artifact-uploaded log files instead of needing a re-run with
  # `--debug` toggled on. Console stays at default level; disk log is
  # debug-level. Aligns with `mise.toml [env]` for local/CI parity.
  # The lint/contract-preflight/p2996-prep/smoke-test jobs upload these
  # via per-job `if: always()` upload-artifact steps.
  # Refs: https://hk.jdx.dev/logging.html, https://mise.jdx.dev/configuration.html#mise-log-file-mise-log
  HK_LOG_FILE_LEVEL: debug
  MISE_LOG_FILE: /tmp/mise.log
  MISE_LOG_FILE_LEVEL: debug

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================
  # Build Type 1: Project linting (hk + mise)
  # ============================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        # mise-action's default `cache: true` keys on
        # {platform}-{install_args_hash}-{file_hash} which subsumes the
        # earlier hand-rolled actions/cache block (keyed only on mise.lock).
        # Granular per-platform AND per-install-args cache hygiene.
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Configure git identity for hk
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate hk config
        run: hk validate
        env:
          HK_PKL_BACKEND: pkl
          HK_LOG: debug

      - name: Run hk checks
        run: hk run pre-commit --all
        env:
          HK_PKL_BACKEND: pkl

      - name: Assert chezmoiignore mise overlay hard gate
        # Machine-checks the .chezmoiignore devcontainer-only gate. Uses the
        # canonical chezmoi.os pattern (linux = devcontainer, darwin = host).
        # The runner is always linux → mise overlay MUST be in `chezmoi managed`.
        # The darwin path is the inverse and is verified locally on Mac via
        # `chezmoi --source ./home managed | grep mise`. Prevents future edits
        # from silently breaking the Mac-pollution defense.
        # See feedback_use_tool_builtins.md and the C10 commit body.
        run: |
          set -euo pipefail
          SRC="$PWD/home"
          T=$(mktemp -d)
          HOME="$T" chezmoi init --source "$SRC" --apply=false >/dev/null
          if ! HOME="$T" chezmoi --source "$SRC" managed \
               | grep -qE '^\.config/mise/config\.toml$'; then
            echo "FAIL: .chezmoiignore regression — mise overlay NOT rendered on linux runner (devcontainer simulation)" >&2
            exit 1
          fi
          rm -rf "$T"
          echo "OK: .chezmoiignore mise overlay renders on linux runner. Darwin path verified locally on Mac."

      - name: Check for outdated tools
        run: mise outdated || true

      - name: Reshim mise tools
        # Explicit reshim to handle the cache-restored-from-fallback case:
        # when mise.lock changes (e.g., a new tool like pipx:mcp2cli is added)
        # the exact cache key misses and restore-keys hydrates an older cache.
        # In that state mise does not re-run install, so the postinstall
        # hook's reshim does not fire, and `mise doctor` reports stale
        # shims. Running reshim explicitly here resynchronises the shim
        # index against the actual installs/ directory.
        run: mise reshim

      - name: Run mise doctor
        run: |
          mise doctor
          echo "## mise doctor" >> "$GITHUB_STEP_SUMMARY"
          mise doctor -J | jq '.' >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      - name: Validate agent documentation
        run: agnix .

      - name: Upload mise lockfile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mise-lock
          path: mise.lock

      - name: Upload diagnostic logs (hk + mise)
        # Always upload so failed/hung runs are diagnosable from the
        # artifact tab without re-running with --verbose. Aligns with
        # the workflow-level HK_LOG_FILE_LEVEL=debug + MISE_LOG_FILE
        # env vars at the top of this file.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-job-logs
          path: |
            /tmp/mise.log
            ~/.local/state/hk/hk.log
          if-no-files-found: ignore

  contract-preflight:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise (python + uv)
        # Subset install: only python + uv, both pinned in mise.toml.
        # Replaces the prior actions/setup-python + astral-sh/setup-uv pair.
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "python uv"

      - name: Validate Dockerfile contracts
        run: |
          uv run --project python dotfiles-setup verify run \
            --category build --category ci --category identity --category architecture \
            --json

  # ============================================================
  # Base cache prep: compute content-hash of devcontainer-base inputs
  # (apt + mise install + cargo crates layer) and ensure
  # ghcr.io/<owner>/<repo>:base-<hash16> exists. On hit, exits in <30s.
  # On miss, builds the `base` target and pushes it. Both p2996-prep
  # and build pull this image instead of rebuilding the heavy ~30 min
  # base layer.
  # ============================================================
  base-prep:
    needs: contract-preflight
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      hash: ${{ steps.hash.outputs.hash }}
      cache_ref: ${{ steps.hash.outputs.cache_ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise (python + uv)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "python uv"

      - name: Compute base cache hash
        id: hash
        run: |
          set -euo pipefail
          hash=$(uv run --project python dotfiles-setup base-hash)
          cache_ref="${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:base-${hash}"
          {
            echo "hash=${hash}"
            echo "cache_ref=${cache_ref}"
          } >> "$GITHUB_OUTPUT"
          {
            echo "## Base cache lookup"
            echo ""
            echo "- Hash: \`${hash}\`"
            echo "- Cache ref: \`${cache_ref}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Probe cache
        id: probe
        run: |
          set -euo pipefail
          if out=$(docker manifest inspect "${{ steps.hash.outputs.cache_ref }}" 2>&1); then
            echo "hit=true" >> "$GITHUB_OUTPUT"
            echo "Cache HIT — skipping base build" >> "$GITHUB_STEP_SUMMARY"
          else
            rc=$?
            if printf '%s\n' "$out" | grep -qiE 'manifest unknown|not found|no such manifest'; then
              echo "hit=false" >> "$GITHUB_OUTPUT"
              echo "Cache MISS — building base target" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "FAIL: docker manifest inspect failed with non-miss error (rc=$rc):" >&2
              printf '%s\n' "$out" >&2
              exit "$rc"
            fi
          fi

      - name: Free runner disk space
        if: steps.probe.outputs.hit != 'true'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Set up Docker Buildx
        if: steps.probe.outputs.hit != 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Write GitHub token for build secret
        if: steps.probe.outputs.hit != 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" > /tmp/github_token

      - name: Build and push base image
        if: steps.probe.outputs.hit != 'true'
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        with:
          source: .
          targets: base
          push: true
          files: |
            docker-bake.hcl
          set: |
            base.tags=${{ steps.hash.outputs.cache_ref }}
            *.secrets=id=github_token,src=/tmp/github_token

  # ============================================================
  # P2996 cache prep: compute content-hash of clang-builder inputs and
  # ensure ghcr.io/<owner>/<repo>:p2996-<hash16> exists. On hash hit
  # (the typical case), this job exits in <30s with cache_ref set; the
  # build job then skips the multi-hour clang compile entirely. On
  # miss, this job builds the p2996-cache target on top of the
  # base-prep image (so mise install layer is pulled, not rebuilt).
  # See .devcontainer/P2996-CACHE.md for the cache mechanism.
  # ============================================================
  p2996-prep:
    needs: [contract-preflight, base-prep]
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # explicit; do not rely on workflow-level inheritance
    outputs:
      hash: ${{ steps.hash.outputs.hash }}
      cache_ref: ${{ steps.hash.outputs.cache_ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise (python + uv)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "python uv"

      - name: Compute P2996 cache hash
        id: hash
        run: |
          set -euo pipefail
          hash=$(uv run --project python dotfiles-setup p2996-hash)
          cache_ref="${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:p2996-${hash}"
          {
            echo "hash=${hash}"
            echo "cache_ref=${cache_ref}"
          } >> "$GITHUB_OUTPUT"
          {
            echo "## P2996 cache lookup"
            echo ""
            echo "- Hash: \`${hash}\`"
            echo "- Cache ref: \`${cache_ref}\`"
            echo "- Base ref: \`${{ needs.base-prep.outputs.cache_ref }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Probe cache
        id: probe
        # Discriminate "manifest not found" (legitimate cache miss) from
        # auth/network/registry failures. Capturing stderr instead of
        # `2>/dev/null` honors `build.no-stderr-suppression`.
        run: |
          set -euo pipefail
          if out=$(docker manifest inspect "${{ steps.hash.outputs.cache_ref }}" 2>&1); then
            echo "hit=true" >> "$GITHUB_OUTPUT"
            echo "Cache HIT — skipping clang-p2996 compile" >> "$GITHUB_STEP_SUMMARY"
          else
            rc=$?
            if printf '%s\n' "$out" | grep -qiE 'manifest unknown|not found|no such manifest'; then
              echo "hit=false" >> "$GITHUB_OUTPUT"
              echo "Cache MISS — building p2996-cache on top of base-prep image" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "FAIL: docker manifest inspect failed with non-miss error (rc=$rc):" >&2
              printf '%s\n' "$out" >&2
              exit "$rc"
            fi
          fi

      - name: Free runner disk space
        if: steps.probe.outputs.hit != 'true'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Set up Docker Buildx
        if: steps.probe.outputs.hit != 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Write GitHub token for build secret
        if: steps.probe.outputs.hit != 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" > /tmp/github_token

      - name: Build and push p2996-cache image
        if: steps.probe.outputs.hit != 'true'
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        with:
          source: .
          targets: p2996-cache
          push: true
          files: |
            docker-bake.hcl
          set: |
            p2996-cache.tags=${{ steps.hash.outputs.cache_ref }}
            p2996-cache.args.DEVCONTAINER_BASE_REF=${{ needs.base-prep.outputs.cache_ref }}
            *.secrets=id=github_token,src=/tmp/github_token

  # ============================================================
  # Build Type 2: Dotfiles environment image (Docker → ghcr.io)
  # ============================================================
  build:
    needs: [contract-preflight, base-prep, p2996-prep]
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Free runner disk space
        # The multi-stage Dockerfile (clang-p2996 builds clang from
        # source, ~30 GB of intermediate artifacts) plus BuildKit cache
        # exceeds the ubuntu-latest runner's ~14 GB free-space budget.
        # Use the maintained `jlumbroso/free-disk-space` action which
        # knows the actual ubuntu-latest image layout — frees ~30 GB
        # reliably (vs. our hand-rolled rm -rf list which only got
        # ~14 GB because half the paths don't exist on this image).
        # Critically: do NOT prune docker system here — it wipes the
        # BuildKit cache that the build NEEDS for the warm-cache path.
        # The cache-cold path needs more disk, not less, and that's
        # what bit ffd6b50.
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          # tool-cache (mise / hostedtoolcache / etc.) is only used by
          # the lint + contract-preflight jobs, which run on separate
          # runner VMs. The build job doesn't read from
          # /opt/hostedtoolcache, so we can wipe it here for ~10-20 GB
          # extra headroom on top of the standard ~30 GB.
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          # docker-images: false — preserve BuildKit cache (ffd6b50
          # learned this the hard way; pruning it forces cold rebuilds
          # which need MORE disk, not less).
          docker-images: false
          swap-storage: true

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.force_dev_tag) }}
            type=raw,value=latest,enable=${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.force_dev_tag) }}
            type=sha,prefix=
            type=ref,event=pr

      - name: Write GitHub token for build secret
        run: echo "${{ secrets.GITHUB_TOKEN }}" > /tmp/github_token

      - name: Build and push
        id: bake
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        with:
          source: .
          targets: ${{ github.event.inputs.target || 'dev' }}
          push: true
          files: |
            docker-bake.hcl
            ${{ steps.meta.outputs.bake-file-tags }}
            ${{ steps.meta.outputs.bake-file-labels }}
          set: |
            *.secrets=id=github_token,src=/tmp/github_token
            dev.args.DEVCONTAINER_BASE_REF=${{ needs.base-prep.outputs.cache_ref }}
            dev.args.P2996_SOURCE=${{ needs.p2996-prep.outputs.cache_ref }}

      # docker/bake-action v6.8.0+ emits a per-job build summary with inputs,
      # errors, and a downloadable .dockerbuild record by default. The prior
      # hand-rolled "Build performance summary" + "Build diagnostics" steps
      # duplicated this and have been removed.

  # ============================================================
  # Smoke test: validate the freshly-pushed image (PR or main).
  # PRs validate the exact :sha-<sha> that promote will retag as
  # :dev/:latest on merge — no rebuild gap between PR validation
  # and main publication.
  # ============================================================
  smoke-test:
    needs: build
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write  # for Trivy SARIF upload to GitHub code scanning
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise (python + uv)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "python uv"

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag
        id: smoke-tag
        run: echo "tag=$(echo '${{ github.sha }}' | head -c 7)" >> "$GITHUB_OUTPUT"

      - name: Pull published image
        run: docker pull ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.smoke-tag.outputs.tag }}

      - name: Smoke published image
        run: |
          uv run --project python dotfiles-setup image smoke \
            --image-ref ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.smoke-tag.outputs.tag }}

      - name: Benchmark published image
        run: |
          uv run --project python dotfiles-setup image benchmark \
            --image-ref ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.smoke-tag.outputs.tag }} \
            --output-path artifacts/build/devcontainer-metrics.json > /tmp/devcontainer-metrics.stdout.json

      - name: Analyze image layer efficiency (Dive)
        # Dive --ci enforces .dive-ci thresholds (lowestEfficiency,
        # highestWastedBytes). Pass/fail gate; replaces the dead-letter
        # top_layers JSON dump in `dotfiles-setup image benchmark`.
        #
        # Direct binary install (NOT `uses: wagoodman/dive@<sha>`):
        # the upstream "action" is a bare Dockerfile (no action.yml)
        # auto-detected by GHA. That Dockerfile has the bug
        #   ARG DOCKER_CLI_VERSION=${DOCKER_CLI_VERSION}
        # which under BuildKit resolves to empty (no env-var inheritance
        # for ARG defaults), so the action build fetches docker-.tgz
        # and fails with 404 before our scan ever runs. The release
        # tarball has no such bug — invoke the binary directly.
        env:
          DIVE_VERSION: 0.13.1
          IMAGE_REF: ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.smoke-tag.outputs.tag }}
        run: |
          set -euo pipefail
          curl -fsSLo /tmp/dive.tar.gz \
            "https://github.com/wagoodman/dive/releases/download/v${DIVE_VERSION}/dive_${DIVE_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/dive.tar.gz -C /tmp dive
          sudo install -m 0755 /tmp/dive /usr/local/bin/dive
          dive --ci --ci-config .dive-ci "${IMAGE_REF}"

      - name: Scan image for CVEs (Trivy, warn-only)
        # Day-1 mode: exit-code: '0' (warn-only). Once the baseline is
        # clean, a follow-up PR flips to exit-code: '1' to gate PRs on
        # regressions. SARIF still uploads to GitHub code scanning so
        # alerts surface in the Security tab regardless.
        # Tracked: https://github.com/ray-manaloto/dotfiles/issues/92
        #
        # `scanners: vuln` narrows scope to CVE detection only —
        # secret + misconfig scans are out of scope for this step
        # (separate concerns, separate tooling) and Trivy's own log
        # advises disabling secret scanning on large images. Without
        # this scope narrowing the run on PR #93 hit the default 5min
        # timeout exporting the multi-GB image through the Docker
        # socket and failed with "context deadline exceeded" before
        # producing a SARIF.
        #
        # `timeout: 15m` is a safety margin on top of the scope
        # narrowing — even a vuln-only scan of a heavy image takes
        # several minutes once the vuln-DB download is included.
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.smoke-tag.outputs.tag }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          scanners: vuln
          timeout: 15m

      - name: Upload Trivy SARIF to GitHub code scanning
        # `hashFiles` guard: if Trivy was skipped or bailed without
        # writing trivy.sarif (e.g. an earlier step failed), don't
        # ask codeql-action to upload a missing file — that turns a
        # benign "Trivy didn't run" into a hard "smoke-test failed".
        # Bare `if: always()` was the previous shape and produced
        # exactly that cascade in run 25193971770.
        if: always() && hashFiles('trivy.sarif') != ''
        uses: github/codeql-action/upload-sarif@65216971a11ded447a6b76263d5a144519e5eee1 # codeql-bundle-v2.25.2
        with:
          sarif_file: trivy.sarif
          category: trivy-image

      # Note: the host-user overlay (Dockerfile.host-user + `devcontainer up`)
      # is a Mac-local concern — it exists to wrap the published base image
      # with the host user's UID/GID for bind-mount permission parity on
      # macOS. CI has no meaningful "host user" to match, no ~/.ssh/.claude/
      # mount sources, and no need to rebuild the overlay. The steps above
      # (Pull / Smoke / Benchmark / Dive / Trivy) fully validate the
      # published base image; overlay behavior is validated locally via
      # `mise run up` on the Mac.

      - name: Upload build metrics artifact
        # `if: always()` so artifacts upload even when Dive fails the
        # threshold gate or Trivy bails on a malformed SARIF — the
        # artifact is the diagnostic surface most needed exactly when
        # the build regressed. Bundles the mise log so diagnose sequence
        # is one-stop in the artifact tab.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: devcontainer-metrics
          path: |
            artifacts/build/devcontainer-metrics.json
            /tmp/devcontainer-metrics.stdout.json
            trivy.sarif
            /tmp/mise.log
          if-no-files-found: ignore

  # ============================================================
  # Promote: tag-only retag of the PR-built image as :dev / :latest.
  # No rebuild — the PR's :pr-<NNN> manifest digest is reused. If the
  # merge commit has no associated PR (e.g., direct push to main, force
  # push), fall back to a workflow_dispatch with force_dev_tag=true.
  # ============================================================
  promote:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Find source PR for this commit
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Look up the PR(s) associated with this commit. Works uniformly
          # for squash, merge-commit, and rebase merges. Query lives in a
          # quoted heredoc so the GraphQL $-parameters are not bash vars.
          cat > /tmp/associated_pr.gql <<'GQL'
          query($owner:String!,$repo:String!,$sha:GitObjectID!){
            repository(owner:$owner,name:$repo){
              object(oid:$sha){
                ... on Commit {
                  associatedPullRequests(first:1) { nodes { number } }
                }
              }
            }
          }
          GQL
          # Capture the raw GraphQL response first so we can discriminate
          # "no PR" (legitimate fallback) from API/auth/scope failure
          # (would silently trigger a multi-hour rebuild today).
          resp=$(gh api graphql \
            -F query=@/tmp/associated_pr.gql \
            -F owner="${{ github.repository_owner }}" \
            -F repo="${{ github.event.repository.name }}" \
            -F sha="${{ github.sha }}")
          if jq -e '.errors' <<<"$resp" >/dev/null 2>&1; then
            echo "FAIL: graphql returned errors:" >&2
            jq '.errors' <<<"$resp" >&2
            exit 1
          fi
          pr_number=$(jq -r \
            '.data.repository.object.associatedPullRequests.nodes[0].number // empty' \
            <<<"$resp")
          if [ -z "$pr_number" ]; then
            echo "No associated PR for ${{ github.sha }} — will fall back to rebuild" >&2
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "Found associated PR #${pr_number}" >&2
            echo "fallback=false" >> "$GITHUB_OUTPUT"
            echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.pr.outputs.fallback != 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        if: steps.pr.outputs.fallback != 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Probe source PR image exists (else fall through to rebuild)
        if: steps.pr.outputs.fallback != 'true'
        id: source_probe
        env:
          IMAGE: ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          set -euo pipefail
          source_ref="${IMAGE}:pr-${PR_NUMBER}"
          # The PR image may have been pruned (GHCR retention, manual
          # delete) by the time a long-running revert merges. If so, the
          # promote retag would fail hard; we instead route this to the
          # rebuild fallback path so the operator never gets stuck. We
          # also discriminate auth/network/registry errors from the
          # legitimate "tag not found" miss.
          err_log=$(mktemp)
          if source_digest=$(docker buildx imagetools inspect "${source_ref}" --format '{{.Manifest.Digest}}' 2>"${err_log}"); then
            if [ -z "${source_digest}" ]; then
              echo "FAIL: imagetools inspect succeeded but Manifest.Digest was empty for ${source_ref}" >&2
              cat "${err_log}" >&2
              exit 1
            fi
            {
              echo "source_present=true"
              echo "source_ref=${source_ref}"
              echo "source_digest=${source_digest}"
            } >> "$GITHUB_OUTPUT"
          elif grep -qiE 'manifest unknown|not found|no such manifest' "${err_log}"; then
            echo "WARN: ${source_ref} not present (retention prune?); switching to rebuild fallback" >&2
            echo "source_present=false" >> "$GITHUB_OUTPUT"
          else
            echo "FAIL: imagetools inspect failed with non-miss error:" >&2
            cat "${err_log}" >&2
            exit 1
          fi

      - name: Retag PR image as :dev and :latest
        if: steps.pr.outputs.fallback != 'true' && steps.source_probe.outputs.source_present == 'true'
        env:
          IMAGE: ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}
          SOURCE_REF: ${{ steps.source_probe.outputs.source_ref }}
          SOURCE_DIGEST: ${{ steps.source_probe.outputs.source_digest }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${IMAGE}:dev" \
            --tag "${IMAGE}:latest" \
            "${SOURCE_REF}"
          # Verify both new tags resolve to the source digest. Without
          # this, `imagetools create` could no-op silently (concurrent
          # push race) and pre-existing stale-but-equal digests would
          # pass the dev==latest check while neither tag was updated.
          dev_digest=$(docker buildx imagetools inspect "${IMAGE}:dev" --format '{{.Manifest.Digest}}')
          latest_digest=$(docker buildx imagetools inspect "${IMAGE}:latest" --format '{{.Manifest.Digest}}')
          for d in "${dev_digest}" "${latest_digest}"; do
            [ -n "$d" ] || { echo "FAIL: empty digest after retag" >&2; exit 1; }
          done
          if [ "${dev_digest}" != "${SOURCE_DIGEST}" ] || [ "${latest_digest}" != "${SOURCE_DIGEST}" ]; then
            echo "FAIL: retag did not propagate source digest" >&2
            echo "  source : ${SOURCE_DIGEST}" >&2
            echo "  :dev   : ${dev_digest}"   >&2
            echo "  :latest: ${latest_digest}" >&2
            exit 1
          fi
          {
            echo "## Promote (tag-only)"
            echo ""
            echo "- Source: \`${SOURCE_REF}\`"
            echo "- New tags: \`:dev\`, \`:latest\` (digest \`${SOURCE_DIGEST}\`)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger fallback rebuild
        if: steps.pr.outputs.fallback == 'true' || steps.source_probe.outputs.source_present == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Verify the dispatch actually created a run — `gh workflow run`
          # returns 0 on a successful queue but does not guarantee a run
          # appears (rare API hiccup, scope misconfig, branch protection).
          # Without verification, a green "fallback rebuild" summary could
          # mask a missing :dev/:latest publication.
          gh workflow run ci.yml \
            --ref main \
            -f target=dev \
            -f force_dev_tag=true
          # The dispatched run takes a moment to appear in the listing;
          # poll briefly rather than rely on a fixed sleep.
          run_id=""
          for _ in 1 2 3 4 5; do
            sleep 3
            run_id=$(gh run list --workflow=ci.yml --branch=main \
                       --event=workflow_dispatch --limit 1 \
                       --json databaseId --jq '.[0].databaseId // empty')
            [ -n "$run_id" ] && break
          done
          if [ -z "$run_id" ]; then
            echo "FAIL: dispatched ci.yml but no workflow_dispatch run appeared" >&2
            exit 1
          fi
          run_url="https://github.com/${{ github.repository }}/actions/runs/${run_id}"
          {
            echo "## Promote (fallback rebuild)"
            echo ""
            echo "No PR / source image available; dispatched ci.yml with force_dev_tag=true."
            echo ""
            echo "Dispatched run: <${run_url}>"
          } >> "$GITHUB_STEP_SUMMARY"
