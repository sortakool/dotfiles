name: CI

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly Sunday midnight
  push:
    branches: [main]
    paths:
      - '.devcontainer/**'
      - 'docker-bake.hcl'
      - 'home/**'
      - 'python/**'
      - 'install.sh'
      - '.github/workflows/ci.yml'
      - 'hk.pkl'
      - 'renovate.json'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Bake target (dev, cpp, all)'
        required: false
        default: 'dev'

env:
  CONTAINER_REGISTRY: ghcr.io
  IMAGE_NAME: ray-manaloto/cpp-devcontainer

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================
  # Build Type 1: Project linting (hk + mise)
  # ============================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Validate hk config
        run: hk validate
        env:
          HK_PKL_BACKEND: pklr
          HK_LOG: debug

      - name: Run hk checks
        run: hk run pre-commit --all
        env:
          HK_PKL_BACKEND: pklr

      - name: Check for outdated tools
        run: mise outdated || true

  contract-preflight:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate Dockerfile contracts
        run: |
          set -euo pipefail
          echo "--- Checking Dockerfile syntax directive ---"
          head -1 .devcontainer/Dockerfile | grep -q 'syntax=docker/dockerfile' || \
            { echo "FAIL: Missing BuildKit syntax directive"; exit 1; }

          echo "--- Checking BASE_IMAGE composability ---"
          grep -q 'ARG BASE_IMAGE' .devcontainer/Dockerfile || \
            { echo "FAIL: Missing BASE_IMAGE build arg"; exit 1; }

          echo "--- Checking install.sh entry point ---"
          grep -q 'install.sh' .devcontainer/Dockerfile || \
            { echo "FAIL: Dockerfile must use install.sh as entry point"; exit 1; }

          echo "--- Checking docker-bake.hcl exists ---"
          test -f docker-bake.hcl || \
            { echo "FAIL: Missing docker-bake.hcl"; exit 1; }

          echo "--- Checking SBOM attestation ---"
          grep -q 'type=sbom' docker-bake.hcl || \
            { echo "FAIL: Missing SBOM attestation in bake config"; exit 1; }

          echo "--- Checking no vscode username ---"
          if grep -rn 'vscode' .devcontainer/Dockerfile* docker-bake.hcl .devcontainer/devcontainer*.json 2>/dev/null | grep -v '#'; then
            echo "FAIL: vscode username reference found in Docker/devcontainer files"
            exit 1
          fi

          echo "All contracts passed."

  # ============================================================
  # Build Type 2: Dotfiles environment image (Docker → ghcr.io)
  # ============================================================
  build:
    needs: contract-preflight
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Restore BuildKit mount caches
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: /tmp/buildkit-cache
          key: buildkit-mounts-${{ runner.os }}-${{ hashFiles('mise.lock', 'home/dot_config/mise/config.toml.tmpl', 'install.sh') }}
          restore-keys: |
            buildkit-mounts-${{ runner.os }}-

      - name: Inject mount caches into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          cache-source: /tmp/buildkit-cache
          cache-map: |
            {
              "mise-data": "/opt/mise",
              "mise-cache": "/opt/mise/cache",
              "uv-cache": "/root/.cache/uv",
              "chezmoi-cache": "/root/.cache/chezmoi",
              "pkl-cache": "/root/.pkl",
              "npm-cache": "/root/.npm"
            }
          skip-extraction: ${{ steps.cache-restore.outputs.cache-hit == 'true' }}

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
            type=sha,prefix=
            type=ref,event=pr

      - name: Write GitHub token for build secret
        run: echo "${{ secrets.GITHUB_TOKEN }}" > /tmp/github_token

      - name: Build and push
        id: bake
        uses: docker/bake-action@82490499d2e5613fcead7e128237ef0b0ea210f7 # v7
        with:
          source: .
          targets: ${{ github.event.inputs.target || 'dev' }}
          push: true
          files: |
            docker-bake.hcl
            ${{ steps.meta.outputs.bake-file-tags }}
            ${{ steps.meta.outputs.bake-file-labels }}
          set: |
            *.secrets=id=github_token,src=/tmp/github_token

      - name: Build performance summary
        if: always()
        run: |
          echo "## Build Performance" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          if docker images "${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}" --format '{{.Size}}' 2>/dev/null | head -1 | read size; then
            echo "| Image size | $size |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Cache sources | registry + gha |" >> $GITHUB_STEP_SUMMARY
          echo "| BuildKit mount caches | mise, uv, pkl |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Check build logs for CACHED markers to verify cache hit rate._" >> $GITHUB_STEP_SUMMARY

      - name: Save BuildKit mount caches
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /tmp/buildkit-cache
          key: buildkit-mounts-${{ runner.os }}-${{ hashFiles('mise.lock', 'home/dot_config/mise/config.toml.tmpl', 'install.sh') }}

  # ============================================================
  # Smoke test: validate the published image
  # ============================================================
  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag
        id: smoke-tag
        run: echo "tag=$(echo '${{ github.sha }}' | head -c 7)" >> "$GITHUB_OUTPUT"

      - name: Pull published image
        run: docker pull ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.smoke-tag.outputs.tag }}

      - name: Validate tools installed
        run: |
          docker run --rm ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.smoke-tag.outputs.tag }} bash -lc '
            set -euo pipefail
            echo "=== hk validate ==="
            cd ~/.local/share/chezmoi && hk validate
            echo "=== mise ls (check no missing) ==="
            missing=$(mise ls 2>&1 | grep -c "(missing)" || true)
            echo "Missing tools: $missing"
            if [ "$missing" -gt 0 ]; then
              mise ls 2>&1 | grep "(missing)"
              exit 1
            fi
            echo "=== All checks passed ==="
          '
