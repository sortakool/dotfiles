name: CI

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly Sunday midnight
  push:
    branches: [main]
    paths:
      - '.devcontainer/**'
      - 'docker-bake.hcl'
      - 'home/**'
      - 'python/**'
      - 'install.sh'
      - '.github/workflows/ci.yml'
      - 'hk.pkl'
      - 'renovate.json'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Bake target (dev, cpp, all)'
        required: false
        default: 'dev'

env:
  CONTAINER_REGISTRY: ghcr.io
  IMAGE_NAME: ray-manaloto/cpp-devcontainer

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================
  # Build Type 1: Project linting (hk + mise)
  # ============================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Validate hk config
        run: hk validate
        env:
          HK_PKL_BACKEND: pklr
          HK_LOG: debug

      - name: Run hk checks
        run: hk run pre-commit --all
        env:
          HK_PKL_BACKEND: pklr

      - name: Check for outdated tools
        run: mise outdated || true

  contract-preflight:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6
        with:
          enable-cache: false

      - name: Validate Dockerfile contracts
        run: |
          uv run --directory python dotfiles-setup verify run \
            --category build --category ci --category identity --category architecture \
            --json

  # ============================================================
  # Build Type 2: Dotfiles environment image (Docker → ghcr.io)
  # ============================================================
  build:
    needs: contract-preflight
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Restore BuildKit mount caches
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: /tmp/buildkit-cache
          key: buildkit-mounts-${{ runner.os }}-${{ hashFiles('mise.lock', 'home/dot_config/mise/config.toml.tmpl', 'install.sh') }}
          restore-keys: |
            buildkit-mounts-${{ runner.os }}-

      - name: Inject mount caches into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          cache-map: |
            {
              "mise-cache": "/opt/mise/cache",
              "uv-cache": "/home/devcontainer/.cache/uv",
              "chezmoi-cache": "/home/devcontainer/.cache/chezmoi",
              "pkl-cache": "/home/devcontainer/.pkl",
              "npm-cache": "/home/devcontainer/.npm"
            }
          skip-extraction: ${{ steps.cache-restore.outputs.cache-hit == 'true' }}

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
            type=sha,prefix=
            type=ref,event=pr

      - name: Write GitHub token for build secret
        run: echo "${{ secrets.GITHUB_TOKEN }}" > /tmp/github_token

      - name: Build and push
        id: bake
        uses: docker/bake-action@82490499d2e5613fcead7e128237ef0b0ea210f7 # v7
        with:
          source: .
          targets: ${{ github.event.inputs.target || 'dev' }}
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          files: |
            docker-bake.hcl
            ${{ steps.meta.outputs.bake-file-tags }}
            ${{ steps.meta.outputs.bake-file-labels }}
          set: |
            *.secrets=id=github_token,src=/tmp/github_token

      - name: Build performance summary
        if: always()
        env:
          BAKE_RESULT: ${{ steps.bake.outcome }}
          CACHE_HIT: ${{ steps.cache-restore.outputs.cache-hit }}
        run: |
          echo "## Build Performance" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build result | ${BAKE_RESULT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| BuildKit mount cache | ${CACHE_HIT:-miss} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache sources | registry + gha |" >> "$GITHUB_STEP_SUMMARY"
          echo "| BuildKit mount caches | mise, uv, chezmoi, pkl, npm |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Compare consecutive runs to verify cache effectiveness._" >> "$GITHUB_STEP_SUMMARY"

      - name: Save BuildKit mount caches
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /tmp/buildkit-cache
          key: buildkit-mounts-${{ runner.os }}-${{ hashFiles('mise.lock', 'home/dot_config/mise/config.toml.tmpl', 'install.sh') }}

  # ============================================================
  # Smoke test: validate the published image
  # ============================================================
  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag
        id: smoke-tag
        run: echo "tag=$(echo '${{ github.sha }}' | head -c 7)" >> "$GITHUB_OUTPUT"

      - name: Pull published image
        run: docker pull ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.smoke-tag.outputs.tag }}

      - name: Validate tools installed
        run: |
          docker run --rm ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.smoke-tag.outputs.tag }} bash -lc '
            set -euo pipefail
            echo "=== hk validate ==="
            cd ~/.local/share/chezmoi
            mise trust .
            hk validate

            echo "=== mise ls (check no missing) ==="
            mise_output=$(mise ls 2>&1)
            missing=$(echo "$mise_output" | grep -c "(missing)" || true)
            echo "Missing tools: $missing"
            if [ "$missing" -gt 0 ]; then
              echo "$mise_output" | grep "(missing)"
              exit 1
            fi

            echo "=== zero-warning check ==="
            warn_count=$(echo "$mise_output" | grep -ci "WARN" || true)
            echo "Mise warnings: $warn_count"
            if [ "$warn_count" -gt 0 ]; then
              echo "FAIL: mise produced warnings (zero-warning policy)"
              echo "$mise_output" | grep -i "WARN"
              exit 1
            fi

            echo "=== All checks passed ==="
          '
