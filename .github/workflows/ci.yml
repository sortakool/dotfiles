name: CI

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly Sunday midnight
  push:
    branches: [main]
    paths:
      - '.devcontainer/**'
      - 'docker-bake.hcl'
      - 'home/**'
      - 'python/**'
      - 'install.sh'
      - '.github/workflows/ci.yml'
      - 'hk.pkl'
      - 'renovate.json'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Bake target (dev, cpp, all)'
        required: false
        default: 'dev'

env:
  CONTAINER_REGISTRY: ghcr.io
  IMAGE_NAME: ray-manaloto/dotfiles-devcontainer
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================
  # Build Type 1: Project linting (hk + mise)
  # ============================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Cache mise tools
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.lock') }}
          restore-keys: mise-${{ runner.os }}-

      - name: Configure git identity for hk
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate hk config
        run: hk validate
        env:
          HK_PKL_BACKEND: pklr
          HK_LOG: debug

      - name: Run hk checks
        run: hk run pre-commit --all
        env:
          HK_PKL_BACKEND: pklr

      - name: Check for outdated tools
        run: mise outdated || true

      - name: Run mise doctor
        run: |
          mise doctor
          echo "## mise doctor" >> "$GITHUB_STEP_SUMMARY"
          mise doctor -J | jq '.' >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      - name: Validate agent documentation
        run: agnix .

      - name: Upload mise lockfile
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mise-lock
          path: mise.lock

  contract-preflight:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: Validate Dockerfile contracts
        run: |
          uv run --directory python dotfiles-setup verify run \
            --category build --category ci --category identity --category architecture \
            --json

  # ============================================================
  # Build Type 2: Dotfiles environment image (Docker → ghcr.io)
  # ============================================================
  build:
    needs: contract-preflight
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
            type=sha,prefix=
            type=ref,event=pr

      - name: Write GitHub token for build secret
        run: echo "${{ secrets.GITHUB_TOKEN }}" > /tmp/github_token

      - name: Build and push
        id: bake
        uses: docker/bake-action@82490499d2e5613fcead7e128237ef0b0ea210f7 # v7.0.0
        with:
          source: .
          targets: ${{ github.event.inputs.target || 'dev' }}
          push: ${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
          files: |
            docker-bake.hcl
            ${{ steps.meta.outputs.bake-file-tags }}
            ${{ steps.meta.outputs.bake-file-labels }}
          set: |
            *.secrets=id=github_token,src=/tmp/github_token
            *.output=type=cacheonly

      - name: Build performance summary
        if: always()
        env:
          BAKE_RESULT: ${{ steps.bake.outcome }}
        run: |
          {
            echo "## Build Performance"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Build result | ${BAKE_RESULT} |"
            echo "| Cache sources | gha |"
            echo ""
            echo "_Compare consecutive runs to verify cache effectiveness._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build diagnostics
        if: always() && steps.bake.outcome != 'cancelled'
        run: |
          {
            echo "## Build Diagnostics"
            echo ""
            echo "### Resolved Bake Configuration"
            echo '```json'
            docker buildx bake --print -f docker-bake.hcl 2>/dev/null | head -80 || echo "bake --print unavailable"
            echo '```'
            echo ""
            echo "### Known Build Warnings"
            echo "| Warning | Status | Tracking |"
            echo "|---------|--------|----------|"
            echo "| mise 'npm may be required' | Deferred | jdx/mise#8923 |"
            echo "| bun 'add global bin to PATH' | Documented | Cosmetic (mise shims handle resolution) |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # Smoke test: validate the published image
  # ============================================================
  smoke-test:
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag
        id: smoke-tag
        run: echo "tag=$(echo '${{ github.sha }}' | head -c 7)" >> "$GITHUB_OUTPUT"

      - name: Pull published image
        run: docker pull ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.smoke-tag.outputs.tag }}

      - name: Smoke published image
        run: |
          uv run --directory python dotfiles-setup image smoke \
            --image-ref ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.smoke-tag.outputs.tag }}

      - name: Benchmark published image
        run: |
          uv run --directory python dotfiles-setup image benchmark \
            --image-ref ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.smoke-tag.outputs.tag }} \
            --output-path artifacts/build/devcontainer-metrics.json > /tmp/devcontainer-metrics.stdout.json

      - name: Upload build metrics artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: devcontainer-metrics
          path: |
            artifacts/build/devcontainer-metrics.json
            /tmp/devcontainer-metrics.stdout.json
