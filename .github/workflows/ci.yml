name: CI

on:
  schedule:
    - cron: "0 0 * * *" # Daily midnight America/Chicago
      timezone: "America/Chicago"
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - "docker-bake.hcl"
      - "home/**"
      - "python/**"
      - "install.sh"
      - ".github/workflows/ci.yml"
      - "hk.pkl"
      - "hk-image.pkl"
      - "hk-common.pkl"
      - "renovate.json"

  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Bake target (dev, cpp, all)"
        required: false
        default: "dev"
      force_dev_tag:
        description: "Tag the build as :dev / :latest (used by promote fallback for direct-to-main pushes without an associated PR)"
        required: false
        default: "false"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CONTAINER_REGISTRY: ghcr.io
  IMAGE_NAME: ray-manaloto/dotfiles-devcontainer
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================
  # Build Type 1: Project linting (hk + mise)
  # ============================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Cache mise tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.lock') }}
          restore-keys: mise-${{ runner.os }}-

      - name: Configure git identity for hk
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate hk config
        run: hk validate
        env:
          HK_PKL_BACKEND: pkl
          HK_LOG: debug

      - name: Run hk checks
        run: hk run pre-commit --all
        env:
          HK_PKL_BACKEND: pkl

      - name: Assert chezmoiignore mise overlay hard gate
        # Machine-checks the .chezmoiignore devcontainer-only gate. Uses the
        # canonical chezmoi.os pattern (linux = devcontainer, darwin = host).
        # The runner is always linux → mise overlay MUST be in `chezmoi managed`.
        # The darwin path is the inverse and is verified locally on Mac via
        # `chezmoi --source ./home managed | grep mise`. Prevents future edits
        # from silently breaking the Mac-pollution defense.
        # See feedback_use_tool_builtins.md and the C10 commit body.
        run: |
          set -euo pipefail
          SRC="$PWD/home"
          T=$(mktemp -d)
          HOME="$T" chezmoi init --source "$SRC" --apply=false >/dev/null
          if ! HOME="$T" chezmoi --source "$SRC" managed \
               | grep -qE '^\.config/mise/config\.toml$'; then
            echo "FAIL: .chezmoiignore regression — mise overlay NOT rendered on linux runner (devcontainer simulation)" >&2
            exit 1
          fi
          rm -rf "$T"
          echo "OK: .chezmoiignore mise overlay renders on linux runner. Darwin path verified locally on Mac."

      - name: Check for outdated tools
        run: mise outdated || true

      - name: Reshim mise tools
        # Explicit reshim to handle the cache-restored-from-fallback case:
        # when mise.lock changes (e.g., a new tool like pipx:mcp2cli is added)
        # the exact cache key misses and restore-keys hydrates an older cache.
        # In that state mise does not re-run install, so the postinstall
        # hook's reshim does not fire, and `mise doctor` reports stale
        # shims. Running reshim explicitly here resynchronises the shim
        # index against the actual installs/ directory.
        run: mise reshim

      - name: Run mise doctor
        run: |
          mise doctor
          echo "## mise doctor" >> "$GITHUB_STEP_SUMMARY"
          mise doctor -J | jq '.' >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      - name: Validate agent documentation
        run: agnix .

      - name: Upload mise lockfile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mise-lock
          path: mise.lock

  contract-preflight:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Validate Dockerfile contracts
        run: |
          uv run --directory python dotfiles-setup verify run \
            --category build --category ci --category identity --category architecture \
            --json

  # ============================================================
  # P2996 cache prep: compute content-hash of clang-builder inputs and
  # ensure ghcr.io/<owner>/<repo>:p2996-<hash16> exists. On hash hit
  # (the typical case), this job exits in <30s with cache_ref set; the
  # build job then skips the ~80–120 min clang compile entirely. On
  # miss, this job builds the p2996-cache target and pushes it.
  # ============================================================
  p2996-prep:
    needs: contract-preflight
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      hash: ${{ steps.hash.outputs.hash }}
      cache_ref: ${{ steps.hash.outputs.cache_ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: Compute P2996 cache hash
        id: hash
        run: |
          set -euo pipefail
          hash=$(uv run --project python dotfiles-setup p2996-hash)
          cache_ref="${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:p2996-${hash}"
          echo "hash=${hash}" >> "$GITHUB_OUTPUT"
          echo "cache_ref=${cache_ref}" >> "$GITHUB_OUTPUT"
          {
            echo "## P2996 cache lookup"
            echo ""
            echo "- Hash: \`${hash}\`"
            echo "- Cache ref: \`${cache_ref}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Probe cache
        id: probe
        run: |
          set -euo pipefail
          if docker manifest inspect "${{ steps.hash.outputs.cache_ref }}" >/dev/null 2>&1; then
            echo "hit=true" >> "$GITHUB_OUTPUT"
            echo "Cache HIT — skipping clang-p2996 compile" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
            echo "Cache MISS — building p2996-cache target" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Free runner disk space
        if: steps.probe.outputs.hit != 'true'
        # See build job for the rationale; cold P2996 build needs the same
        # ~30 GB headroom that the full base image build needs.
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Set up Docker Buildx
        if: steps.probe.outputs.hit != 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push p2996-cache image
        if: steps.probe.outputs.hit != 'true'
        uses: docker/bake-action@82490499d2e5613fcead7e128237ef0b0ea210f7 # v7.0.0
        with:
          source: .
          targets: p2996-cache
          push: true
          files: |
            docker-bake.hcl
          set: |
            p2996-cache.tags=${{ steps.hash.outputs.cache_ref }}

  # ============================================================
  # Build Type 2: Dotfiles environment image (Docker → ghcr.io)
  # ============================================================
  build:
    needs: [contract-preflight, p2996-prep]
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Free runner disk space
        # The multi-stage Dockerfile (clang-p2996 builds clang from
        # source, ~30 GB of intermediate artifacts) plus BuildKit cache
        # exceeds the ubuntu-latest runner's ~14 GB free-space budget.
        # Use the maintained `jlumbroso/free-disk-space` action which
        # knows the actual ubuntu-latest image layout — frees ~30 GB
        # reliably (vs. our hand-rolled rm -rf list which only got
        # ~14 GB because half the paths don't exist on this image).
        # Critically: do NOT prune docker system here — it wipes the
        # BuildKit cache that the build NEEDS for the warm-cache path.
        # The cache-cold path needs more disk, not less, and that's
        # what bit ffd6b50.
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          # tool-cache (mise / hostedtoolcache / etc.) is only used by
          # the lint + contract-preflight jobs, which run on separate
          # runner VMs. The build job doesn't read from
          # /opt/hostedtoolcache, so we can wipe it here for ~10-20 GB
          # extra headroom on top of the standard ~30 GB.
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          # docker-images: false — preserve BuildKit cache (ffd6b50
          # learned this the hard way; pruning it forces cold rebuilds
          # which need MORE disk, not less).
          docker-images: false
          swap-storage: true

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.force_dev_tag == 'true') }}
            type=raw,value=latest,enable=${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.force_dev_tag == 'true') }}
            type=sha,prefix=
            type=ref,event=pr

      - name: Write GitHub token for build secret
        run: echo "${{ secrets.GITHUB_TOKEN }}" > /tmp/github_token

      - name: Build and push
        id: bake
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        with:
          source: .
          targets: ${{ github.event.inputs.target || 'dev' }}
          push: true
          files: |
            docker-bake.hcl
            ${{ steps.meta.outputs.bake-file-tags }}
            ${{ steps.meta.outputs.bake-file-labels }}
          set: |
            *.secrets=id=github_token,src=/tmp/github_token
            dev.args.P2996_SOURCE=${{ needs.p2996-prep.outputs.cache_ref }}

      - name: Build performance summary
        if: always()
        env:
          BAKE_RESULT: ${{ steps.bake.outcome }}
        run: |
          {
            echo "## Build Performance"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Build result | ${BAKE_RESULT} |"
            echo "| Cache sources | gha |"
            echo ""
            echo "_Compare consecutive runs to verify cache effectiveness._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build diagnostics
        if: always() && steps.bake.outcome != 'cancelled'
        run: |
          {
            echo "## Build Diagnostics"
            echo ""
            echo "### Resolved Bake Configuration"
            echo '```json'
            docker buildx bake --print -f docker-bake.hcl 2>/dev/null | head -80 || echo "bake --print unavailable"
            echo '```'
            echo ""
            echo "### Known Build Warnings"
            echo "| Warning | Status | Tracking |"
            echo "|---------|--------|----------|"
            echo "| mise 'npm may be required' | Deferred | jdx/mise#8923 |"
            echo "| bun 'add global bin to PATH' | Documented | Cosmetic (mise shims handle resolution) |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # Smoke test: validate the freshly-pushed image (PR or main).
  # PRs validate the exact :sha-<sha> that promote will retag as
  # :dev/:latest on merge — no rebuild gap between PR validation
  # and main publication.
  # ============================================================
  smoke-test:
    needs: build
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag
        id: smoke-tag
        run: echo "tag=$(echo '${{ github.sha }}' | head -c 7)" >> "$GITHUB_OUTPUT"

      - name: Pull published image
        run: docker pull ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.smoke-tag.outputs.tag }}

      - name: Smoke published image
        run: |
          uv run --directory python dotfiles-setup image smoke \
            --image-ref ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.smoke-tag.outputs.tag }}

      - name: Benchmark published image
        run: |
          uv run --directory python dotfiles-setup image benchmark \
            --image-ref ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.smoke-tag.outputs.tag }} \
            --output-path artifacts/build/devcontainer-metrics.json > /tmp/devcontainer-metrics.stdout.json

      # Note: the host-user overlay (Dockerfile.host-user + `devcontainer up`)
      # is a Mac-local concern — it exists to wrap the published base image
      # with the host user's UID/GID for bind-mount permission parity on
      # macOS. CI has no meaningful "host user" to match, no ~/.ssh/.claude/
      # mount sources, and no need to rebuild the overlay. The steps above
      # (Pull / Smoke / Benchmark) fully validate the published base image;
      # overlay behavior is validated locally via `mise run up` on the Mac.

      - name: Upload build metrics artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: devcontainer-metrics
          path: |
            artifacts/build/devcontainer-metrics.json
            /tmp/devcontainer-metrics.stdout.json

  # ============================================================
  # Promote: tag-only retag of the PR-built image as :dev / :latest.
  # No rebuild — the PR's :pr-<NNN> manifest digest is reused. If the
  # merge commit has no associated PR (e.g., direct push to main, force
  # push), fall back to a workflow_dispatch with force_dev_tag=true.
  # ============================================================
  promote:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Find source PR for this commit
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Look up the PR(s) associated with this commit. Works uniformly
          # for squash, merge-commit, and rebase merges. Query lives in a
          # quoted heredoc so the GraphQL $-parameters are not bash vars.
          cat > /tmp/associated_pr.gql <<'GQL'
          query($owner:String!,$repo:String!,$sha:GitObjectID!){
            repository(owner:$owner,name:$repo){
              object(oid:$sha){
                ... on Commit {
                  associatedPullRequests(first:1) { nodes { number } }
                }
              }
            }
          }
          GQL
          pr_number=$(gh api graphql \
            -F query=@/tmp/associated_pr.gql \
            -F owner="${{ github.repository_owner }}" \
            -F repo="${{ github.event.repository.name }}" \
            -F sha="${{ github.sha }}" \
            --jq '.data.repository.object.associatedPullRequests.nodes[0].number // empty')
          if [ -z "$pr_number" ]; then
            echo "No associated PR for ${{ github.sha }} — will fall back to rebuild" >&2
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "Found associated PR #${pr_number}" >&2
            echo "fallback=false" >> "$GITHUB_OUTPUT"
            echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.pr.outputs.fallback != 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        if: steps.pr.outputs.fallback != 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag PR image as :dev and :latest
        if: steps.pr.outputs.fallback != 'true'
        id: retag
        env:
          IMAGE: ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          set -euo pipefail
          source_ref="${IMAGE}:pr-${PR_NUMBER}"
          docker buildx imagetools create \
            --tag "${IMAGE}:dev" \
            --tag "${IMAGE}:latest" \
            "${source_ref}"
          # Verify both new tags resolve to a manifest digest. With
          # set -o pipefail the awk failure (e.g., empty input) propagates.
          dev_digest=$(docker buildx imagetools inspect "${IMAGE}:dev" --format '{{.Manifest.Digest}}')
          latest_digest=$(docker buildx imagetools inspect "${IMAGE}:latest" --format '{{.Manifest.Digest}}')
          if [ "${dev_digest}" != "${latest_digest}" ]; then
            echo "FAIL: :dev and :latest resolve to different digests after retag" >&2
            echo "  :dev    -> ${dev_digest}"    >&2
            echo "  :latest -> ${latest_digest}" >&2
            exit 1
          fi
          {
            echo "## Promote (tag-only)"
            echo ""
            echo "- Source: \`${source_ref}\`"
            echo "- New tags: \`:dev\`, \`:latest\` (digest \`${dev_digest}\`)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger fallback rebuild
        if: steps.pr.outputs.fallback == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run ci.yml \
            --ref main \
            -f target=dev \
            -f force_dev_tag=true
          {
            echo "## Promote (fallback rebuild)"
            echo ""
            echo "No PR associated with this commit; dispatched ci.yml with force_dev_tag=true."
          } >> "$GITHUB_STEP_SUMMARY"
