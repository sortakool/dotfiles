# Dependabot configuration file
# Documentation: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# DEMO FILE: Copy to .github/dependabot.yml in your target repository.
# This file demonstrates real-world Dependabot configuration patterns
# used in production environments.

version: 2

updates:
  # ─────────────────────────────────────────────────────────────────────────
  # GitHub Actions
  # Always include this ecosystem — Actions updates are important for security
  # copied from: https://github.com/certforge/GH_500_Cert_Prep/blob/main/demos/03-dependabot/dependabot.yml
  # ─────────────────────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"    # Always use "/" — Dependabot scans .github/workflows/ automatically

    schedule:
      interval: "cron"
      # Daily midnight America/Chicago. Dependabot rejects cron expressions
      # under a 24h minimum, so sub-daily intervals (e.g. "0 * * * *") fail
      # validation against dependabot-api.githubapp.com.
      cronjob: "0 0 * * *"
      timezone: "America/Chicago"

    open-pull-requests-limit: 5

    groups:
      github-actions:
        patterns:
          - "*"         # Group ALL Actions updates into a single PR

    labels:
      - "dependencies"
      - "github-actions"

    commit-message:
      prefix: "ci"

  - package-ecosystem: "pip"  # Use "pip" even for pyproject.toml projects
    directory: "/python"      # Location of your pyproject.toml
    schedule:
      interval: "cron"
      # Daily midnight America/Chicago. Dependabot rejects cron expressions
      # under a 24h minimum, so sub-daily intervals (e.g. "0 * * * *") fail
      # validation against dependabot-api.githubapp.com.
      cronjob: "0 0 * * *"
      timezone: "America/Chicago"

    open-pull-requests-limit: 5

    groups:
      github-actions:
        patterns:
          - "*"         # Group ALL Actions updates into a single PR

    labels:
      - "dependencies"
      - "python"

    commit-message:
      prefix: "ci" 
