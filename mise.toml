# Project tools — for linting, validating, and developing this repo
# These are Build Type 1 tools: run locally before commits

[tools]
hk = "1.41.0"
pkl = "0.31.1"
hadolint = "2.14.0"
shellcheck = "0.11.0"
shfmt = "3.13.1"
taplo = "0.10.0"
actionlint = "1.7.12"
typos = "1.45.0"
yamllint = "1.38.0"
yamlfmt = "0.21.0"
yq = "4.52.5"
ghalint = "1.5.5"
jq = "1.8.1"
# Python toolchain for the mde-py package in python/
python = "3.14.4"
uv = "0.11.5"
pinact = "latest"
chezmoi = "latest"  # Used by CI lint hard-gate step to verify .chezmoiignore mise overlay gating
"npm:@devcontainers/cli" = "0.85.0"
colima = "0.10.1"  # Alternate Docker runtime (VZ + Rosetta); Docker Desktop is the CURRENT supported runtime — see AGENTS.md Docker Runtimes + .omc/research/research-20260409c-dockerdesktop-ssh/
lima = "2.1.1"     # Runtime dependency for colima (provides limactl); kept for deferred Colima follow-up
"npm:agnix" = "latest"
"npm:agents-lint" = "latest"
"pipx:mcp2cli" = "3.0.1"
# Markdown + Claude-docs linters. Installed now; hk.pkl integration is
# scheduled for post-devcontainer-work review (see GH issue tracking
# follow-up). claude_md_size_limit (below in hk.pkl) provides the
# immediate 200-line enforcement per Claude Code memory docs.
"npm:claude-code-lint" = "latest"       # https://github.com/pdugan20/claudelint — CLAUDE.md size limits, import syntax, frontmatter
"npm:@contextlint/cli" = "latest"       # https://github.com/nozomi-koborinai/contextlint — structured markdown cross-file integrity
"npm:markdownlint-cli2" = "latest"      # https://github.com/DavidAnson/markdownlint — general markdown quality (MD013 line-length, etc.)
"ubi:jackchuka/mdschema" = "latest"     # https://github.com/jackchuka/mdschema — markdown frontmatter schema validation
"ubi:rvben/rumdl" = "latest"            # https://github.com/rvben/rumdl — Rust-fast markdown linter (71 rules)
"npm:oh-my-claude-sisyphus" = "4.11.4"
"github:ast-grep/ast-grep" = "0.42.1"
lefthook = "2.1.5"
"npm:ctx7" = "0.3.10"
rtk = "0.35.0"
"npm:skills" = "1.4.9"
"npm:agent-browser" = "0.25.3"
"npm:portless" = "0.10.1"
"pipx:deepagents-cli" = "0.0.35"
aws-cli = { version = "2.34.27", symlink_bins = "true" }
azure-cli = { version = "2.85.0", uvx_args = "--prerelease=allow" }
docker-cli = "29.4.0"
opencode = "1.4.0"
"npm:@claude-flow/cli" = "3.5.78"
"npm:@ralph-orchestrator/ralph-cli" = "2.9.1"

[settings]
experimental = true
auto_install = true
lockfile = true

[settings.status]
show_prepare_stale = true

[hooks]
# Reshim after every tool install so `mise doctor` does not report stale
# shims from the pipx backend (observed in CI for pipx:mcp2cli — local was
# clean, CI failed with "unused shims: mcp2cli" on fresh install).
postinstall = "mise reshim && hk install --mise"

[env]
HK_PKL_BACKEND = "pkl"  # "pkl" (not pklr) required for import/spread in hk-common.pkl
HK_MISE = "1"

# Directory-scoped shell aliases — auto-activated when cwd is inside this
# repo, deactivated on leave. Interactive-shell only (not usable inside
# task `run` blocks per mise docs). Kept short for inner-loop muscle
# memory; the canonical UX is still `mise run <task>`.
[shell_alias]
dcu     = "mise run up"
dcd     = "mise run down"
dcdev   = "mise run dev"
dcpull  = "mise run pull"
dcsh    = "mise run sh"
dcps    = "mise run ps"
dcsmoke = "mise run smoke"
dcverify = "mise run verify-image"

[prepare.python]
auto = true
dir = "python"
sources = ["pyproject.toml", "uv.lock"]
outputs = [".venv/"]
run = "uv sync"

[tasks.lint]
description = "Run all linters via hk"
run = "hk run pre-commit --all"

[tasks.check]
description = "Run full quality check (lint + test)"
depends = ["lint", "test"]

[tasks.test]
description = "Run Python test suite"
run = "uv run --project python pytest tests/ -x -q"

[tasks.up]
description = "Bring the devcontainer up via the official @devcontainers/cli (Mac-local)"
# BASE_IMAGE default is task-scoped (not global [env]) so it does not leak
# into unrelated subprocesses. Override with e.g.
#   BASE_IMAGE=ghcr.io/ray-manaloto/dotfiles-devcontainer:latest mise run up
# or pin to a specific SHA tag.
#
# DOCKER_DEFAULT_PLATFORM is task-scoped so it only affects `devcontainer up`
# (and its child docker calls) — host-level docker/colima invocations are
# unaffected. Required because the devcontainer image is amd64-only.
#
# DEVCONTAINER_SSH_PORT is the HOST-side port for the inbound shell
# (Requirement R1: `ssh ${USER}@localhost -p 4444` opens a shell in the
# container). Container-internal sshd listens on 2222 (feature hardcoded);
# devcontainer.json maps ${DEVCONTAINER_SSH_PORT}:2222 via appPort.
# Override per-clone via mise.local.toml on port collision without losing
# named volumes — volume names do NOT include the port (C10/C11/C12).
#
# Outbound agent forwarding (Requirement R2: `ssh -T git@github.com` from
# inside container) is independent; uses the host-TCP + container-unix-
# socket proxy pattern spawned from initializeCommand/postStartCommand.
# Research: .omc/research/research-20260407-ssh-devcontainer/report.md.
#
# --pull flag (default true) implements "pull only if missing": first run
# pulls the base image, subsequent restarts reuse the local copy. Force a
# fresh pull with `mise run pull` or `mise run up --no-pull=false` after
# CI republishes :dev. Bypass entirely with `mise run up --no-pull`.
env = { BASE_IMAGE = "ghcr.io/ray-manaloto/dotfiles-devcontainer:dev", DOCKER_DEFAULT_PLATFORM = "linux/amd64", DEVCONTAINER_SSH_PORT = "4444", DOPPLER_PROJECT = "dotfiles", DOPPLER_CONFIG = "dev" }
usage = '''
flag "--pull" default=#true help="Pull :dev if the image is missing locally (default: true)"
'''
run = '''
if [[ "${usage_pull:-true}" == "true" ]]; then
  if ! docker image inspect "$BASE_IMAGE" >/dev/null 2>&1; then
    echo "==> base image $BASE_IMAGE not present locally — pulling"
    docker pull "$BASE_IMAGE"
  fi
fi
# Clear stale host keys for the devcontainer SSH port — each container
# recreate generates new host keys, causing "REMOTE HOST IDENTIFICATION
# HAS CHANGED" warnings. ssh-keygen -R removes the old entry.
ssh-keygen -R "[localhost]:${DEVCONTAINER_SSH_PORT}" 2>/dev/null || true
devcontainer up --workspace-folder .
'''

[tasks.pull]
description = "Force-pull the latest :dev base image from ghcr"
env = { BASE_IMAGE = "ghcr.io/ray-manaloto/dotfiles-devcontainer:dev", DOCKER_DEFAULT_PLATFORM = "linux/amd64" }
run = 'docker pull "$BASE_IMAGE"'

[tasks.verify-image]
description = "Spot-check cookbook paths in :dev (cargo/rustup cookbook layout + core toolchains)"
# Source of truth for what's INSIDE :dev is .devcontainer/mise-system.toml,
# NOT root mise.toml. Root mise.toml tools (hk, pkl, the 5 markdown
# linters, etc.) live on the HOST, not in the image. Keep assertions here
# scoped to what mise-system.toml actually provides.
env = { BASE_IMAGE = "ghcr.io/ray-manaloto/dotfiles-devcontainer:dev", DOCKER_DEFAULT_PLATFORM = "linux/amd64" }
run = '''
docker run --rm "$BASE_IMAGE" bash -lc '
  set -euo pipefail
  # Cookbook cargo/rustup homes (PR-2 commit F)
  ls /usr/local/share/cargo/bin
  ls /usr/local/share/rustup/toolchains
  test ! -d /opt/cargo
  test ! -d /opt/rustup
  # Core toolchain reachability via mise activation
  cargo --version
  rustc --version
  clang --version
'
'''

[tasks.smoke]
description = "Run tier 1-3 smoke checks inside the running devcontainer"
run = "devcontainer exec --workspace-folder . scripts/devcontainer-smoke.sh"

[tasks.sh]
description = "Open an interactive shell in the running devcontainer"
alias = "shell"
run = "devcontainer exec --workspace-folder . bash -l"

[tasks.ps]
description = "Show the running devcontainer + its named volumes"
run = '''
docker ps --filter "label=devcontainer.local_folder=$PWD" --format 'table {{"{{"}}.Names{{"}}"}}\t{{"{{"}}.Status{{"}}"}}\t{{"{{"}}.Ports{{"}}"}}'
docker volume ls --format '{{"{{"}}.Name{{"}}"}}' | grep -E 'mise-user|cargo-user|rustup-user' || true
'''

[tasks.dev]
description = "Full devloop: pull :dev → up → smoke (sequential)"
# NOTE: `depends = [...]` in mise runs tasks in parallel when independent
# — not what we want here. A sequential shell body forces ordering while
# keeping each sub-task independently runnable.
run = '''
set -euo pipefail
mise run pull
mise run up
mise run smoke
'''

[tasks.persistence]
description = "Verify .devcontainer/mise-system.toml tools survive a devcontainer stop/up cycle"
# Source of truth for the expected tool set is .devcontainer/mise-system.toml
# (installed to /usr/local/share/mise/config.toml inside :dev). This task
# takes the runtime `mise ls --json --installed` view as ground truth,
# cross-checked against a minimum count parsed from mise-system.toml, and
# asserts every (tool, version) entry survives a stop/up cycle unchanged.
#
# Requires a running devcontainer on entry; the devloop
# `mise run dev` / `mise run verify-local` brings it up first.
run = '''
set -euo pipefail
SNAPSHOT=/tmp/mise-persistence-before.json
AFTER=/tmp/mise-persistence-after.json
SYSTEM_TOML=.devcontainer/mise-system.toml

# (0) Derive the expected minimum tool count from mise-system.toml.
#     Python tomllib is the canonical parser; python 3.14 is pinned in
#     project mise.toml so this is always available during local runs.
EXPECTED_MIN=$(python3 -c "
import tomllib, sys
with open('$SYSTEM_TOML', 'rb') as f:
    cfg = tomllib.load(f)
print(len(cfg.get('tools', {})))
")
echo "==> mise-system.toml declares $EXPECTED_MIN tools"

# (1) Pre-teardown: snapshot resolved versions.
#     `mise doctor` is advisory only — inside the container it sees the
#     workspace /workspaces/dotfiles/mise.toml which legitimately lists
#     host-only tools (colima, lima, @devcontainers/cli, agnix, markdown
#     linters) that are NOT in mise-system.toml. Doctor reports them as
#     "(missing)" with a non-zero exit. The TRUE persistence invariant is
#     the snapshot diff (step 4) being empty; doctor is logged but never
#     fails the gate. Architectural cleanup (untrust the workspace config
#     in-container) is tracked as a follow-up — see issue #70 thread.
echo "==> mise doctor (pre-teardown, advisory)"
devcontainer exec --workspace-folder . bash -lc 'mise doctor || true'

echo "==> capturing pre-teardown snapshot"
devcontainer exec --workspace-folder . bash -lc 'mise ls --json --installed' > "$SNAPSHOT"
PRE_COUNT=$(jq 'length' "$SNAPSHOT")
echo "pre-teardown installed tool count: $PRE_COUNT"
if [ "$PRE_COUNT" -lt "$EXPECTED_MIN" ]; then
  echo "FAIL: fewer tools installed ($PRE_COUNT) than mise-system.toml declares ($EXPECTED_MIN)" >&2
  exit 1
fi

# (2) Stop/up cycle — the actual persistence test.
echo "==> tearing container down"
mise run stop
echo "==> bringing container back up"
mise run up

# (3) Post-restart: snapshot. `mise doctor` advisory only (see step 1).
echo "==> mise doctor (post-restart, advisory)"
devcontainer exec --workspace-folder . bash -lc 'mise doctor || true'

echo "==> capturing post-restart snapshot"
devcontainer exec --workspace-folder . bash -lc 'mise ls --json --installed' > "$AFTER"
POST_COUNT=$(jq 'length' "$AFTER")
echo "post-restart installed tool count: $POST_COUNT"

# (4) Snapshot parity: every (tool, version) in $SNAPSHOT must be in $AFTER.
#     Host-side jq diff so we can fail with a clear drift message.
jq -r 'to_entries[] | .key as $k | .value[] | "\($k)\t\(.version)"' "$SNAPSHOT" | sort > /tmp/mise-persistence-pre.tsv
jq -r 'to_entries[] | .key as $k | .value[] | "\($k)\t\(.version)"' "$AFTER"    | sort > /tmp/mise-persistence-post.tsv
if ! diff -u /tmp/mise-persistence-pre.tsv /tmp/mise-persistence-post.tsv; then
  echo "FAIL: installed-tool set drifted across stop/up" >&2
  exit 1
fi
echo "OK: $PRE_COUNT tools persisted identically across stop/up (mise-system.toml baseline: $EXPECTED_MIN)"
'''

[tasks.verify-arch]
description = "R3: container runs as linux/amd64 x86_64 (not ARM passthrough)"
# Proves Requirement 3: the container is AMD64 regardless of host arch.
# Three independent signals: (1) docker image manifest architecture,
# (2) container uname -m, (3) container arch. All three must report
# x86_64/amd64. The host can be arm64 (macOS ARM via Docker Desktop
# Rosetta, or the deferred Colima VZ+Rosetta path) or amd64 (Linux CI
# runner); we don't check the host.
run = '''
set -euo pipefail
container_name="$(docker ps -q --filter "label=devcontainer.local_folder=$PWD" | head -1)"
if [ -z "${container_name}" ]; then
  echo "FAIL: no running devcontainer for $PWD" >&2
  exit 1
fi
echo "==> docker image architecture"
image_id=$(docker inspect "${container_name}" --format '{{"{{"}}.Image{{"}}"}}')
image_arch=$(docker image inspect "${image_id}" --format '{{"{{"}}.Architecture{{"}}"}}')
echo "image: ${image_arch}"
[ "${image_arch}" = "amd64" ] || { echo "FAIL: image arch is ${image_arch}, expected amd64" >&2; exit 1; }

echo "==> container uname -m"
uname_m=$(docker exec "${container_name}" uname -m)
echo "uname -m: ${uname_m}"
[ "${uname_m}" = "x86_64" ] || { echo "FAIL: uname -m is ${uname_m}, expected x86_64" >&2; exit 1; }

echo "==> container arch"
arch_out=$(docker exec "${container_name}" arch)
echo "arch: ${arch_out}"
[ "${arch_out}" = "x86_64" ] || { echo "FAIL: arch is ${arch_out}, expected x86_64" >&2; exit 1; }

echo "OK: R3 container is linux/amd64 x86_64 on all three signals"
'''

[tasks.verify-ssh-inbound]
description = "R1: ssh ${USER}@localhost -p ${DEVCONTAINER_SSH_PORT} succeeds from the host"
# Proves Requirement 1: the ghcr.io/devcontainers/features/sshd feature
# is running sshd inside the container, the host port mapping is live,
# and the authorized_keys copy in postCreateCommand worked (host user
# can log in without a password). Runs on the HOST, not inside the
# container. StrictHostKeyChecking=accept-new + UserKnownHostsFile=/dev/
# null so we don't pollute the host's known_hosts with the container's
# ephemeral host keys.
env = { DEVCONTAINER_SSH_PORT = "4444" }
run = '''
set -euo pipefail
port="${DEVCONTAINER_SSH_PORT}"
echo "==> probing ssh ${USER}@localhost -p ${port}"
out=$(ssh -o BatchMode=yes \
          -o StrictHostKeyChecking=accept-new \
          -o UserKnownHostsFile=/dev/null \
          -o LogLevel=ERROR \
          -o ConnectTimeout=10 \
          -p "${port}" "${USER}@localhost" 'hostname && whoami')
echo "${out}"
echo "${out}" | grep -q "${USER}" || {
  echo "FAIL: whoami did not return ${USER}" >&2
  exit 1
}
echo "OK: R1 inbound ssh ${USER}@localhost -p ${port} works"
'''

[tasks.verify-secrets]
description = "S1: doppler env file exists and contains secrets"
env = { DOPPLER_PROJECT = "dotfiles", DOPPLER_CONFIG = "dev" }
run = '''
set -euo pipefail
envfile="${HOME}/.local/state/dotfiles/doppler.env"
if [ ! -f "${envfile}" ]; then
  echo "FAIL: ${envfile} does not exist (run 'mise run up' to generate)" >&2
  exit 1
fi
count=$(wc -l < "${envfile}" | tr -d ' ')
if [ "${count}" -lt 1 ]; then
  echo "FAIL: ${envfile} is empty (doppler download failed?)" >&2
  exit 1
fi
# Verify canary keys are present
for key in DOPPLER_PROJECT DOPPLER_CONFIG; do
  if ! grep -q "^${key}=" "${envfile}"; then
    echo "FAIL: ${key} not found in ${envfile}" >&2
    exit 1
  fi
done
echo "OK: S1 doppler env file has ${count} secrets (project=${DOPPLER_PROJECT}, config=${DOPPLER_CONFIG})"
'''

[tasks.verify-local]
description = "Full local devcontainer validation (pull → verify-image → up → ps → smoke → persistence → verify-ssh-inbound → verify-secrets)"
# Sequential shell body (not `depends = [...]`) so mise can't parallelize
# the steps — smoke/persistence rely on up finishing first, and
# verify-image relies on pull finishing first. verify-ssh-inbound (R1)
# runs last because it needs postCreateCommand to have installed
# ~/.ssh/authorized_keys from the host-state bind mount. verify-secrets
# (S1) validates the host-side doppler env file.
run = '''
set -euo pipefail
mise run pull
mise run verify-image
mise run up
mise run ps
mise run verify-arch
mise run smoke
mise run persistence
mise run verify-ssh-inbound
mise run verify-secrets
'''

[tasks.prune]
description = "Full devcontainer prune: stop container, remove volumes, images, and build cache"
run = '''
set -euo pipefail
echo "==> stopping container"
docker rm -f $(docker ps -aq --filter "label=devcontainer.local_folder=$PWD") 2>/dev/null || true
echo "==> removing named volumes"
docker volume ls --format '{{"{{"}}.Name{{"}}"}}' | grep -E "dotfiles-$(basename "$PWD")-${USER}" | xargs -r docker volume rm 2>/dev/null || true
echo "==> removing overlay images"
docker images --format '{{"{{"}}.Repository{{"}}"}}:{{"{{"}}.Tag{{"}}"}}' | grep vsc-dotfiles | xargs -r docker rmi 2>/dev/null || true
echo "==> pruning build cache"
docker builder prune -f 2>&1 | tail -1
echo "==> done"
'''

[tasks.stop]
description = "Tear the devcontainer down (no 'devcontainer down' verb in v0.85.0)"
alias = "down"
# devcontainer CLI v0.85.0 has no 'down' verb (verified 2026-04-06 via
# `devcontainer --help`; verbs: up, set-up, build, run-user-commands,
# read-configuration, outdated, upgrade, features, templates, exec).
# Teardown uses `docker rm -f` filtered on the workspace-folder label
# that the devcontainer CLI applies to every container it creates.
#
# R2 outbound now uses Docker Desktop's native magic socket — no host
# proxy to tear down (deleted in #77 stage 2).
run = '''
docker rm -f $(docker ps -aq --filter "label=devcontainer.local_folder=$PWD") || true
'''

[tasks.build]
description = "Build the docker image locally using docker bake"
run = "docker buildx bake dev-load"

[tasks.fmt]
description = "Auto-fix formatting issues"
run = "hk fix"

[tasks.outdated]
description = "Check for outdated tool versions"
run = "mise outdated"

[tasks.validate]
description = "Validate Docker and CI contracts"
run = "docker buildx bake validate"

[tasks.pin-actions]
description = "Verify GHA actions are SHA-pinned"
run = "pinact run --verify"

[tasks.lint-docs]
description = "Validate agent documentation"
run = "agnix ."

[tasks.lock]
description = "Regenerate mise.lock"
run = "mise lock"
