# Project tools — for linting, validating, and developing this repo
# These are Build Type 1 tools: run locally before commits

[tools]
hk = "1.39.0"
pkl = "0.31.1"
hadolint = "2.14.0"
shellcheck = "0.11.0"
shfmt = "3.13.0"
taplo = "0.10.0"
actionlint = "1.7.11"
typos = "1.44.0"
yamllint = "1.38.0"
yamlfmt = "0.18.0"
yq = "4.52.5"
ghalint = "1.0.0"
jq = "1.8.1"
# Python toolchain for the mde-py package in python/
python = "3.14.3"
uv = "0.11.2"

[settings]
experimental = true
auto_install = true

[settings.status]
show_prepare_stale = true

[env]
HK_PKL_BACKEND = "pklr"
HK_MISE = "1"

[prepare.python]
auto = true
dir = "python"
sources = ["pyproject.toml", "uv.lock"]
outputs = [".venv/"]
run = "uv sync"

[tasks.lint]
description = "Run all linters via hk"
run = "hk run pre-commit --all"

[tasks.check]
description = "Run full quality check (lint + test)"
depends = ["lint", "test"]

[tasks.test]
description = "Run Python test suite"
run = "uv run pytest tests/ -x -q"

[tasks.fmt]
description = "Auto-fix formatting issues"
run = "hk fix"

[tasks.outdated]
description = "Check for outdated tool versions"
run = "mise outdated"

[tasks.validate]
description = "Validate Docker and CI contracts"
run = "hk check --all"
